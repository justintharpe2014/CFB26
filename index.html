<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>College Football Dynasty Sim (Offline)</title>
  <style>
    :root{
      --bg:#0a0f16; --text:#eaf2ff; --muted:#a8bbd6;
      --line:#263a55;
      --good:#4ee08a; --warn:#ffd166; --bad:#ff5d5d;
      --accent:#63b3ff; --accent2:#b58cff; --accent3:#7CFFB2;
      --shadow: 0 14px 34px rgba(0,0,0,.38); --radius:14px;
      --safeTop: env(safe-area-inset-top, 0px); --safeBot: env(safe-area-inset-bottom, 0px);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(99,179,255,.17), transparent 60%),
        radial-gradient(900px 700px at 85% 0%, rgba(181,140,255,.13), transparent 55%),
        radial-gradient(900px 800px at 40% 90%, rgba(124,255,178,.08), transparent 55%),
        var(--bg);
      color:var(--text);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      overflow-x:hidden;
    }
    html, body { overflow-x: hidden; }
    main, .card, .list, .itemCard { max-width: 100%; }

    header{
      position:sticky; top:0; z-index:60;
      background: linear-gradient(180deg, rgba(10,15,22,.96), rgba(10,15,22,.78));
      backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(38,58,85,.65);
      padding: calc(6px + var(--safeTop)) 10px 6px;
    }
    .topRow{display:flex; gap:10px; align-items:center; justify-content:space-between; max-width:1120px; margin:0 auto;}
    .leftHdr{display:flex; align-items:center; gap:10px; min-width:0}
    .brand{display:flex; flex-direction:column; gap:1px; min-width:0}
    .brand .title{font-weight:950; letter-spacing:.4px; font-size:13px; display:flex; align-items:center; gap:8px; white-space:nowrap;}
    .pill{
      padding:2px 7px;
      border:1px solid rgba(99,179,255,.40);
      background: rgba(99,179,255,.12);
      border-radius:999px;
      font-size:10px; color:var(--accent); font-weight:900;
    }
    .sub{
      color:var(--muted); font-size:11px; line-height:1.2;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      max-width: 64vw;
    }
    .topActions{display:flex; gap:8px; align-items:center; justify-content:flex-end; flex:0 0 auto;}

    button{
      border:1px solid rgba(38,58,85,.92);
      background: linear-gradient(180deg, rgba(18,28,43,.97), rgba(15,22,32,.95));
      color:var(--text);
      border-radius:12px; padding:9px 10px;
      font-weight:900; font-size:12px;
      cursor:pointer; box-shadow: 0 8px 18px rgba(0,0,0,.16); user-select:none;
      transition: transform .05s ease, border-color .15s ease, filter .15s ease;
      touch-action: manipulation;
      white-space:nowrap;
    }
    button:hover{ border-color: rgba(99,179,255,.65); }
    button:active{ transform: translateY(1px); }
    button:disabled{opacity:.45; cursor:not-allowed; filter:saturate(.6);}
    .btnAccent{border-color: rgba(99,179,255,.68); background: linear-gradient(180deg, rgba(99,179,255,.22), rgba(15,22,32,.95));}
    .btnGood{border-color: rgba(78,224,138,.58); background: linear-gradient(180deg, rgba(78,224,138,.18), rgba(15,22,32,.95));}
    .btnDanger{border-color: rgba(255,93,93,.58); background: linear-gradient(180deg, rgba(255,93,93,.18), rgba(15,22,32,.95));}
    .btnWarn{border-color: rgba(255,209,102,.55); background: linear-gradient(180deg, rgba(255,209,102,.14), rgba(15,22,32,.95));}
    .iconBtn{
      width:40px; height:40px; padding:0;
      display:inline-flex; align-items:center; justify-content:center;
      border-radius:12px;
    }

    main{
      max-width:1120px;
      margin:0 auto;
      padding:12px 12px calc(18px + var(--safeBot));
    }
    .grid{display:grid; grid-template-columns: 1.15fr .85fr; gap:12px;}
    @media (max-width: 920px){.grid{grid-template-columns:1fr}}

    .card{
      background: linear-gradient(180deg, rgba(18,28,43,.92), rgba(12,18,26,.92));
      border:1px solid rgba(38,58,85,.82);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding:12px;
    }
    .card h2{margin:0 0 8px; font-size:14px; letter-spacing:.35px;}
    .muted{color:var(--muted)}
    .sep{height:1px; background:rgba(38,58,85,.75); margin:10px 0;}
    .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
    .rowBetween{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;}
    .chip{
      background: rgba(22,36,55,.92);
      border:1px solid rgba(38,58,85,.82);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px; font-weight:900;
      display:inline-flex; gap:6px; align-items:center;
    }
    .chip .k{color:var(--muted); font-weight:950; font-size:11px; letter-spacing:.2px;}

    input,select,textarea{
      width:100%;
      border-radius:12px;
      border:1px solid rgba(38,58,85,.92);
      background: rgba(10,14,19,.78);
      color:var(--text);
      padding:10px;
      outline:none;
      font-size:13px;
    }
    label{font-size:12px; color:var(--muted); font-weight:950; display:block; margin:8px 0 6px;}
    .hint{font-size:11px; color:var(--muted); margin-top:6px; line-height:1.28;}
    .badge{
      padding:3px 8px; border-radius:999px;
      font-size:11px; font-weight:950;
      border:1px solid rgba(38,58,85,.88);
      background: rgba(22,36,55,.75);
      display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
    }
    .bGood{border-color: rgba(78,224,138,.52); color: rgba(170,255,212,1); background: rgba(78,224,138,.11);}
    .bBad{border-color: rgba(255,93,93,.52); color: rgba(255,182,182,1); background: rgba(255,93,93,.10);}
    .bWarn{border-color: rgba(255,209,102,.52); color: rgba(255,241,192,1); background: rgba(255,209,102,.12);}
    .bAcc{border-color: rgba(99,179,255,.62); color: rgba(200,230,255,1); background: rgba(99,179,255,.12);}
    .bAcc2{border-color: rgba(181,140,255,.62); color: rgba(230,212,255,1); background: rgba(181,140,255,.12);}
    .progress{height:10px; border-radius:999px; border:1px solid rgba(38,58,85,.88); background: rgba(10,14,19,.82); overflow:hidden;}
    .bar{height:100%; width:0%; background: linear-gradient(90deg, rgba(99,179,255,.95), rgba(181,140,255,.95));}

    .toasts{position:fixed; top: calc(52px + var(--safeTop)); right: 10px; z-index: 90; display:flex; flex-direction:column; gap:8px; max-width: 92vw; pointer-events:none;}
    .toast{pointer-events:none; background: rgba(18,28,43,.92); border:1px solid rgba(38,58,85,.92); border-left:5px solid rgba(99,179,255,.85); border-radius: 12px; padding: 10px 12px; box-shadow: var(--shadow); font-size: 12px; line-height: 1.25; max-width: 440px;}
    .toast.good{border-left-color: rgba(78,224,138,.92);}
    .toast.bad{border-left-color: rgba(255,93,93,.92);}
    .toast.warn{border-left-color: rgba(255,209,102,.92);}
    .toast .t{font-weight:950; margin-bottom:2px;}
    .toast .s{color:var(--muted);}

    .twoCol{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    @media (max-width: 640px){ .twoCol{grid-template-columns:1fr;} .sub{max-width:56vw} }
    .right{text-align:right;}
    .mini{font-size:11px}

    .overlay{
      position:fixed; inset:0; z-index:140;
      background: rgba(0,0,0,.58);
      backdrop-filter: blur(6px);
      display:flex; align-items:center; justify-content:center;
      padding: 14px;
    }
    .modal{
      width:min(660px, 96vw);
      border-radius: 18px;
      border:1px solid rgba(38,58,85,.92);
      box-shadow: 0 20px 80px rgba(0,0,0,.55);
      background:
        radial-gradient(900px 300px at 10% 0%, rgba(99,179,255,.22), transparent 55%),
        radial-gradient(900px 300px at 90% 0%, rgba(181,140,255,.18), transparent 55%),
        linear-gradient(180deg, rgba(18,28,43,.96), rgba(12,18,26,.96));
      padding: 14px;
      max-height: calc(92vh - var(--safeTop) - var(--safeBot));
      overflow:auto;
      -webkit-overflow-scrolling: touch;
    }
    .hero{
      border-radius: 14px;
      border:1px solid rgba(99,179,255,.42);
      background: linear-gradient(90deg, rgba(99,179,255,.20), rgba(181,140,255,.18));
      padding: 12px;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    .hero .big{font-size: 15px; font-weight: 1000; letter-spacing:.2px; line-height:1.15;}
    .hero .subt{font-size: 12px; font-weight: 950; color: rgba(255,241,192,1);}
    .hero .logo{font-size: 28px; filter: drop-shadow(0 10px 20px rgba(0,0,0,.35));}

    .drawerOverlay{
      position:fixed; inset:0; z-index:120;
      background: rgba(0,0,0,.42);
      backdrop-filter: blur(6px);
      display:none;
    }
    .drawerOverlay.open{display:block;}
    .drawer{
      position:fixed; top:0; left:0;
      height:100%;
      width:min(320px, 86vw);
      padding: calc(10px + var(--safeTop)) 12px 12px;
      background: linear-gradient(180deg, rgba(18,28,43,.98), rgba(12,18,26,.98));
      border-right:1px solid rgba(38,58,85,.82);
      box-shadow: 24px 0 80px rgba(0,0,0,.55);
      transform: translateX(-105%);
      transition: transform .18s ease;
      display:flex; flex-direction:column; gap:10px;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
    }
    .drawerOverlay.open .drawer{transform: translateX(0);}
    .drawerHdr{display:flex; align-items:center; justify-content:space-between; gap:10px;}
    .drawerTitle{font-weight:1000; letter-spacing:.3px;}
    .navList{display:flex; flex-direction:column; gap:8px; margin-top:6px;}
    .navItem{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      padding:10px 10px;
      border-radius:14px;
      border:1px solid rgba(38,58,85,.86);
      background: rgba(18,28,43,.62);
      color:var(--muted);
      cursor:pointer; user-select:none; touch-action: manipulation;
    }
    .navItem .l{display:flex; align-items:center; gap:10px; font-weight:950; color:inherit;}
    .navItem.active{color:var(--text); border-color: rgba(99,179,255,.68); background: rgba(99,179,255,.12);}

    @media (max-width: 520px){
      .hideOnPhone{display:none !important;}
      .sub{max-width:56vw}
    }

    .list{display:flex; flex-direction:column; gap:10px;}
    .itemCard{
      border-radius: 14px;
      border: 1px solid rgba(38,58,85,.82);
      background: linear-gradient(180deg, rgba(18,28,43,.82), rgba(12,18,26,.82));
      padding: 10px;
    }
    .itemTop{
      display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
    }
    .itemTitle{
      font-weight: 1000;
      line-height: 1.15;
      font-size: 13px;
    }
    .itemMeta{
      margin-top:4px;
      display:flex; flex-wrap:wrap; gap:6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    .itemStats{
      margin-top:8px;
      display:flex; flex-wrap:wrap; gap:8px;
    }
    .statPill{
      border:1px solid rgba(38,58,85,.82);
      background: rgba(22,36,55,.65);
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 900;
      color: var(--text);
      display:inline-flex; gap:6px; align-items:center;
    }
    .statPill .k{color:var(--muted); font-weight: 950; font-size:10px;}
    .actionLine{
      margin-top:10px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .divider{height:1px; background: rgba(38,58,85,.70); margin:10px 0;}
  </style>
</head>
<body>
<header>
  <div class="topRow">
    <div class="leftHdr">
      <button class="iconBtn" data-act="drawer_open" aria-label="Menu">☰</button>
      <div class="brand">
        <div class="title">🏈 CFB Dynasty Sim <span class="pill">OFFLINE</span></div>
        <div class="sub" id="subLine">Loading…</div>
      </div>
    </div>

    <div class="topActions">
      <button class="btnAccent" data-act="advance">Advance</button>
      <button class="hideOnPhone" data-act="sim">Sim</button>
      <button class="hideOnPhone btnGood" data-act="save">Save</button>
    </div>
  </div>
</header>

<div class="toasts" id="toasts"></div>

<div class="drawerOverlay" id="drawer">
  <div class="drawer" role="dialog" aria-modal="true" aria-label="Navigation menu">
    <div class="drawerHdr">
      <div class="drawerTitle">Menu</div>
      <button class="iconBtn" data-act="drawer_close" aria-label="Close">✕</button>
    </div>

    <div class="card" style="padding:10px; background:rgba(18,28,43,.55)">
      <div class="row" style="gap:8px">
        <button class="btnAccent" style="flex:1" data-act="advance">Advance</button>
        <button style="flex:1" data-act="sim">Sim</button>
      </div>
      <div class="row" style="gap:8px; margin-top:8px">
        <button class="btnGood" style="flex:1" data-act="save">Save</button>
        <button class="btnDanger" style="flex:1" data-act="hard_reset">Reset</button>
      </div>
      <div class="hint">All tabs live here. No bottom bar.</div>
    </div>

    <div class="navList" id="navList"></div>
  </div>
</div>

<main id="app"></main>
<div id="overlayRoot"></div>

<script>
/* ==========================================================
   FINAL BUILD — CFB Dynasty Sim (Offline)
   - Same UX as basketball build, adapted to football
   - Bottom-25 start
   - 12-team CFP (top 5 conf champs autobids, top 4 byes)
   - Conf champ week + CFP rounds + title
   - Stacked cards everywhere
========================================================== */

const U = {
  clamp:(v,a,b)=>Math.max(a,Math.min(b,v)),
  rint:(a,b)=>Math.floor(a + Math.random()*(b-a+1)),
  pick:(arr)=>arr[Math.floor(Math.random()*arr.length)],
  uuid:()=> (crypto?.randomUUID ? crypto.randomUUID() : ("id"+Math.random().toString(16).slice(2)+Date.now())),
  deepCopy:(o)=>JSON.parse(JSON.stringify(o)),
  safe:(s)=> (s??"").toString().replace(/[<>&"]/g, m=>({ "<":"&lt;", ">":"&gt;", "&":"&amp;", "\"":"&quot;" }[m])),
  fmt:(n)=> (n??0).toLocaleString(),
};

function toast(title, msg, type=""){
  const wrap = document.getElementById("toasts");
  const el = document.createElement("div");
  el.className = "toast " + (type||"");
  el.innerHTML = `<div class="t">${U.safe(title)}</div><div class="s">${U.safe(msg)}</div>`;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity="0"; el.style.transform="translateY(-6px)"; }, 3400);
  setTimeout(()=>{ el.remove(); }, 4100);
}

/* ---------- IndexedDB KV ---------- */
const STORE = (() => {
  const DB_NAME = "cfb_dynasty_db_final";
  const STORE_NAME = "kv";
  let dbPromise = null;

  function openDB(){
    if(dbPromise) return dbPromise;
    dbPromise = new Promise((resolve)=>{
      if(!("indexedDB" in window)) return resolve(null);
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if(!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => resolve(null);
    });
    return dbPromise;
  }

  async function idbGet(key){
    const db = await openDB();
    if(!db) return null;
    return new Promise((resolve)=>{
      const tx = db.transaction(STORE_NAME, "readonly");
      const st = tx.objectStore(STORE_NAME);
      const rq = st.get(key);
      rq.onsuccess = () => resolve(rq.result ?? null);
      rq.onerror = () => resolve(null);
    });
  }

  async function idbSet(key, val){
    const db = await openDB();
    if(!db) return false;
    return new Promise((resolve)=>{
      const tx = db.transaction(STORE_NAME, "readwrite");
      const st = tx.objectStore(STORE_NAME);
      const rq = st.put(val, key);
      rq.onsuccess = () => resolve(true);
      rq.onerror = () => resolve(false);
    });
  }

  async function idbDel(key){
    const db = await openDB();
    if(!db) return false;
    return new Promise((resolve)=>{
      const tx = db.transaction(STORE_NAME, "readwrite");
      const st = tx.objectStore(STORE_NAME);
      const rq = st.delete(key);
      rq.onsuccess = () => resolve(true);
      rq.onerror = () => resolve(false);
    });
  }

  function lsGet(key){ try{ return JSON.parse(localStorage.getItem(key)); }catch(e){ return null; } }
  function lsSet(key,val){ try{ localStorage.setItem(key, JSON.stringify(val)); return true; }catch(e){ return false; } }
  function lsDel(key){ try{ localStorage.removeItem(key); return true; }catch(e){ return false; } }

  return {
    async get(key){ const v = await idbGet(key); return v ?? lsGet(key); },
    async set(key,val){ const ok = await idbSet(key,val); return ok || lsSet(key,val); },
    async del(key){ const ok = await idbDel(key); return ok || lsDel(key); },
  };
})();

/* ---------- Game Config ---------- */
const GAME = {
  SAVE_KEY: "cfb_dynasty_SAVE_FINAL",
  MAX_SCHOLARSHIPS: 85,
  REG_WEEKS: 12,
  CONF_CHAMP_WEEK: 13,
  CFP_R1_WEEK: 14,   // 5-12 (home)
  CFP_QF_WEEK: 15,   // top 4 enter
  CFP_SF_WEEK: 16,
  CFP_TITLE_WEEK: 17,
  OFFSEASON_WEEKS: 4,
  RECRUIT_POOL: 700,
  PORTAL_POOL: 260,
  POS: ["QB","RB","WR","TE","OL","DL","LB","CB","S","ATH"],
  OFF_POS: new Set(["QB","RB","WR","TE","OL","ATH"]),
  DEF_POS: new Set(["DL","LB","CB","S","ATH"]),
  STATES: ["AL","AK","AZ","AR","CA","CO","CT","DE","FL","GA","HI","ID","IL","IN","IA","KS","KY","LA","ME","MD","MA","MI","MN","MS","MO","MT","NE","NV","NH","NJ","NM","NY","NC","ND","OH","OK","OR","PA","RI","SC","SD","TN","TX","UT","VT","VA","WA","WV","WI","WY"],
};
function weekName(weekIndex){
  if(weekIndex===0) return "Preseason";
  if(weekIndex>=1 && weekIndex<=GAME.REG_WEEKS) return `Week ${weekIndex}`;
  if(weekIndex===GAME.CONF_CHAMP_WEEK) return "Conference Championship Week";
  if(weekIndex===GAME.CFP_R1_WEEK) return "CFP First Round";
  if(weekIndex===GAME.CFP_QF_WEEK) return "CFP Quarterfinals";
  if(weekIndex===GAME.CFP_SF_WEEK) return "CFP Semifinals";
  if(weekIndex===GAME.CFP_TITLE_WEEK) return "National Championship";
  const offStart = GAME.CFP_TITLE_WEEK + 1;
  if(weekIndex===offStart) return "Offseason Wk1 (Jobs+Portal)";
  if(weekIndex===offStart+1) return "Offseason Wk2 (Portal)";
  if(weekIndex===offStart+2) return "Offseason Wk3 (Late Recruiting)";
  if(weekIndex===offStart+3) return "Offseason Wk4 (Signing/Progression)";
  return `Week ${weekIndex}`;
}

/* ---------- Names ---------- */
const NAME = {
  first:["Jaden","Marcus","DeAndre","Tyrese","Cameron","Ethan","Jaylen","Noah","Kobe","Miles","Dylan","Malik","Zion","Jordan","Caleb","Tre","Bryce","Isaiah","Damian","Aiden","Rashad","Micah","Logan","Colin","Xavier","Julian","Elijah","Gavin","Brandon","Terrence","Carter","Adrian","Nate","Chris","Kevin","Antonio","Kyler","Mason","Grant","Hunter","AJ","RJ","TJ","DJ"],

  coachFirst:["Mike","Dan","Chris","Ryan","Eric","Tony","Steve","James","Matt","Brad","Kevin","Derek","Nate","Robert","Sam","Rich","Jeff","Grant","Kyle","Todd","Mark","Andre","Jason","Pat","Bryan","John","Zach","Will"],

function genPlayerName(){ return U.pick(NAME.first)+" "+U.pick(NAME.last); }
function genCoachName(){ return U.pick(NAME.coachFirst)+" "+U.pick(NAME.coachLast); }

/* ---------- Teamset (starter list) ----------
   This is a functional default set.
   If you want the exact 2026 FBS membership, add an import box like before and paste a teamset JSON.
*/
const TEAMSET = {
  version: 1,
  conferences: [
    {name:"SEC", prestigeBase:86, teams:["Alabama","Arkansas","Auburn","Florida","Georgia","Kentucky","LSU","Mississippi State","Missouri","Oklahoma","Ole Miss","South Carolina","Tennessee","Texas","Texas A&M","Vanderbilt"]},
    {name:"Big Ten", prestigeBase:86, teams:["Illinois","Indiana","Iowa","Maryland","Michigan","Michigan State","Minnesota","Nebraska","Northwestern","Ohio State","Oregon","Penn State","Purdue","Rutgers","UCLA","USC","Washington","Wisconsin"]},
    {name:"Big 12", prestigeBase:84, teams:["Arizona","Arizona State","Baylor","BYU","Cincinnati","Colorado","Houston","Iowa State","Kansas","Kansas State","Oklahoma State","TCU","Texas Tech","UCF","Utah","West Virginia"]},
    {name:"ACC", prestigeBase:83, teams:["Boston College","Clemson","Duke","Florida State","Georgia Tech","Louisville","Miami","NC State","North Carolina","Notre Dame","Pittsburgh","SMU","Syracuse","Virginia","Virginia Tech","Wake Forest"]},

/* ---------- Coaching skill tree (same structure as basketball build) ---------- */
const ARCH = ["Recruiter","Motivator","Tactician","Program Builder","CEO"];
const SKILL_NODES = {
  Recruiter: [
    {key:"rec_board", name:"Board Magnet", tier:1, max:3, desc:"+Starting interest"},
    {key:"rec_close", name:"Closer", tier:2, max:3, desc:"+Late commit odds"},
    {key:"rec_visits", name:"Visit King", tier:2, max:3, desc:"+Visit impact"},
    {key:"rec_sway", name:"Sway Artist", tier:3, max:2, desc:"+Sway success odds"},
    {key:"rec_elite", name:"Elite Recruiter", tier:4, max:2, desc:"+Big boosts to 4–5★ battles"},
  ],
  Motivator: [
    {key:"mot_dev", name:"Player Growth", tier:1, max:3, desc:"+Offseason development"},
    {key:"mot_consist", name:"Consistency", tier:2, max:3, desc:"-Variance"},
    {key:"mot_retention", name:"Locker Room", tier:2, max:3, desc:"+Retention persuasion"},
    {key:"mot_hot", name:"Hot Hand", tier:3, max:2, desc:"+Upset chance when hot"},
    {key:"mot_master", name:"Master Motivator", tier:4, max:2, desc:"+Big development boost"},
  ],
  Tactician: [
    {key:"tac_off", name:"Offense System", tier:1, max:3, desc:"+Sim offense"},
    {key:"tac_def", name:"Defense System", tier:1, max:3, desc:"+Sim defense"},
    {key:"tac_close", name:"Close Game Killer", tier:2, max:3, desc:"+Win tight games"},
    {key:"tac_scout", name:"Opponent Scout", tier:3, max:2, desc:"+Less upset risk"},
    {key:"tac_guru", name:"System Guru", tier:4, max:2, desc:"+Big sim edge"},
  ],
  "Program Builder": [
    {key:"pb_brand", name:"Brand Builder", tier:4, max:2, desc:"+Prestige growth"},
    {key:"pb_fac", name:"Facility Push", tier:4, max:2, desc:"+Budget/grades"},
  ],
  CEO: [
    {key:"ceo_staff", name:"Staff Boss", tier:5, max:2, desc:"Better assistants"},
    {key:"ceo_nil", name:"Big Money", tier:5, max:2, desc:"+Close rate"},
  ]
};
function makeSkillState(){
  const out = {};
  for(const a of ARCH){
    out[a] = {};
    for(const n of (SKILL_NODES[a]||[])){
      out[a][n.key] = {lvl:0, max:n.max};
    }
  }
  return out;
}
function nodeCost(archetype, key, lvl){
  const node = (SKILL_NODES[archetype]||[]).find(x=>x.key===key);
  if(!node) return 1;
  const base = node.tier<=2 ? 1 : (node.tier===3 ? 2 : (node.tier===4 ? 3 : 4));
  return base + lvl;
}
function sumArchLevels(coach, arch){
  const s = coach.skillsTree?.[arch] || {};
  return Object.values(s).reduce((a,x)=>a+(x.lvl||0),0);
}
function sumAllLevels(coach){
  return ARCH.reduce((a,arch)=>a+sumArchLevels(coach,arch),0);
}
function archUnlocked(coach, archetype){
  if(archetype==="Program Builder"){
    const r = sumArchLevels(coach,"Recruiter");
    const m = sumArchLevels(coach,"Motivator");
    const t = sumArchLevels(coach,"Tactician");
    return (r>=6 && (m>=4 || t>=4));
  }
  if(archetype==="CEO"){
    const total = sumAllLevels(coach);
    const natties = coach?.career?.natties ?? 0;
    const pf = coach?.career?.playoffWins ?? 0;
    return total>=18 && (natties>=1 || pf>=4);
  }
  return true;
}

/* ---------- Coach ---------- */
function makeCoach({name}){
  return {
    id: U.uuid(),
    name,
    role:"HC",
    prestige: U.clamp(45 + U.rint(-8,+10), 20, 95),
    rep:{ recruiting: U.rint(35,75), dev: U.rint(35,75), tactics: U.rint(35,75) },
    xp: 0,
    skillPoints: 3,
    spCarry: 0,
    skillsTree: makeSkillState(),
    goals:null,
    hotSeat:0,
    contract:null,
    career:{ wins:0, losses:0, natties:0, playoffWins:0 },
    legacy:0,
  };
}
function xpGainMultiplier(){
  const m = S?.settings?.xpSpeed ?? 1.0;
  return U.clamp(parseFloat(m)||1.0, 0.25, 4.0);
}
function skillPointRate(){
  const r = S?.settings?.skillPointRate ?? 1.0;
  return U.clamp(parseFloat(r)||1.0, 0.5, 4.0);
}
function addXP(coach, amt){
  if(!coach) return;
  if(S?.settings?.infiniteXP){
    coach.skillPoints = 999;
    coach.xp = 0;
    for(const a of ARCH){
      for(const n of (SKILL_NODES[a]||[])){
        coach.skillsTree[a][n.key].lvl = coach.skillsTree[a][n.key].max;
      }
    }
    return;
  }
  coach.xp += Math.round(amt * xpGainMultiplier());
  while(coach.xp >= 100){
    coach.xp -= 100;
    coach.spCarry += skillPointRate();
    while(coach.spCarry >= 1.0){
      coach.skillPoints += 1;
      coach.spCarry -= 1.0;
      toast("Skill Point", "+1 skill point earned.", "good");
    }
  }
}
function upgradeNode(coach, arch, key){
  if(!coach) return;
  if(!archUnlocked(coach, arch)) return toast("Locked", `${arch} is locked.`, "bad");
  const node = (SKILL_NODES[arch]||[]).find(x=>x.key===key);
  if(!node) return;
  const st = coach.skillsTree[arch][key];
  if(st.lvl >= st.max) return toast("Maxed", "That perk is max level.", "bad");
  const cost = nodeCost(arch, key, st.lvl);
  if(!S.settings.infiniteXP && coach.skillPoints < cost) return toast("No Points", `Need ${cost} skill points.`, "bad");
  if(!S.settings.infiniteXP) coach.skillPoints -= cost;
  st.lvl += 1;
  toast("Upgraded", `${node.name} → Lv ${st.lvl} (Cost ${cost})`, "good");
}

/* ---------- Player / Team ---------- */
function blankStats(){
  return { gp:0, passY:0, rushY:0, recY:0, tkl:0, sack:0, int:0 };
}
function ensureStats(p){
  if(!p.seasonStats) p.seasonStats = blankStats();
  if(!p.careerStats) p.careerStats = blankStats();
}
function addStats(dst, add){
  for(const k of Object.keys(add)){
    if(typeof add[k]==="number") dst[k] = (dst[k]||0) + add[k];
  }
}
function makePlayer({pos,year,ovr,pot}){
  return { id: U.uuid(), name: genPlayerName(), pos, year, ovr, pot, seasonStats: blankStats(), careerStats: blankStats() };
}
function teamAvgOVR(team){
  return Math.round(team.roster.reduce((a,p)=>a+p.ovr,0)/Math.max(1,team.roster.length));
}
function recomputeScholarships(team){
  const now = Math.max(0, GAME.MAX_SCHOLARSHIPS - (team.roster?.length||0));
  const seniors = (team.roster||[]).filter(p=>p.year==="SR").length;
  team.scholarshipsNow = now;
  team.scholarshipsProjected = U.clamp(now + seniors, 0, GAME.MAX_SCHOLARSHIPS);
  team.scholarships = team.scholarshipsNow;
}
function computeNeeds(team){
  const counts = {};
  for(const p of team.roster) counts[p.pos] = (counts[p.pos]||0)+1;
  const target = {QB:4,RB:10,WR:18,TE:6,OL:16,DL:14,LB:12,CB:12,S:10,ATH:3};
  team.needs = {};
  for(const pos of GAME.POS) team.needs[pos] = Math.max(0, (target[pos]||0) - (counts[pos]||0));
}
function buildRoster(team){
  // tightened roster distribution (85)
  const dist = [];
  dist.push(...Array(4).fill("QB"));
  dist.push(...Array(10).fill("RB"));
  dist.push(...Array(18).fill("WR"));
  dist.push(...Array(6).fill("TE"));
  dist.push(...Array(16).fill("OL"));
  dist.push(...Array(14).fill("DL"));
  dist.push(...Array(12).fill("LB"));
  dist.push(...Array(12).fill("CB"));
  dist.push(...Array(10).fill("S"));
  dist.push(...Array(3).fill("ATH"));
  dist.length = 85;

  // ensure CB/S exist even at low schools
  const years = [];
  years.push(...Array(20).fill("SR"));
  years.push(...Array(22).fill("JR"));
  years.push(...Array(22).fill("SO"));
  years.push(...Array(21).fill("FR"));

  return dist.map((pos,i)=>{
    const base = U.clamp(team.ovr + U.rint(-16,+10), 45, 93);
    const ovr = U.clamp(base + U.rint(-10,+8), 40, 95);
    const year = years[i] || U.pick(["FR","SO","JR","SR"]);
    const pot = U.rint(0,10);
    const p = makePlayer({pos,year,ovr,pot});
    ensureStats(p);
    return p;
  });
}

/* ---------- Grades + recruiting motives ---------- */
const LETTERS = ["F","D","C","B","A"];
function scoreToLetter(score){
  const s = U.clamp(Math.round(score),0,100);
  if(s>=85) return "A";
  if(s>=70) return "B";
  if(s>=55) return "C";
  if(s>=40) return "D";
  return "F";
}
function letterVal(l){ return LETTERS.indexOf(l)<0?0:LETTERS.indexOf(l); }

const MOTIVES = ["brand","facilities","champ","pro","stability","playingTime"];
const DEAL_REQ = { brand:"C", facilities:"C", champ:"C", pro:"C", stability:"C", playingTime:"B" };

function computeGrades(team){
  const games = team.season.games||0;
  const winPct = games ? (team.season.w/games) : 0;
  const coach = team.staff?.HC;

  const brand = U.clamp(team.prestige*0.72 + winPct*22 + U.rint(-6,6), 0, 100);
  const facilities = U.clamp(team.budget*0.78 + U.rint(-10,10), 0, 100);
  const champ = U.clamp(team.ovr*0.45 + team.prestige*0.35 + winPct*26 + U.rint(-8,8), 0, 100);
  const pro = U.clamp(team.ovr*0.70 + U.rint(-8,8), 0, 100);
  const stability = U.clamp(75 - (coach?.hotSeat||0)*14 + (sumArchLevels(coach,"Motivator")*1.8) + U.rint(-8,8), 0, 100);

  const proj = team.scholarshipsProjected ?? 0;
  const playingTime = U.clamp(30 + proj*3.2 + U.rint(-10,10), 0, 100);

  team.grades = {
    brand: scoreToLetter(brand),
    facilities: scoreToLetter(facilities),
    champ: scoreToLetter(champ),
    pro: scoreToLetter(pro),
    stability: scoreToLetter(stability),
    playingTime: scoreToLetter(playingTime),
  };
  return team.grades;
}
function meetsDeal(team, deal){
  const need = DEAL_REQ[deal] || "C";
  const got = team.grades?.[deal] || "F";
  return letterVal(got) >= letterVal(need);
}

/* ---------- Recruits ---------- */
function makeRecruit(){
  const ovr = U.clamp(U.rint(58,92) + (Math.random()<0.06?U.rint(3,6):0), 55, 97);
  const stars = U.clamp(Math.round((ovr-55)/8), 1, 5);
  const motives = U.deepCopy(MOTIVES).sort(()=>Math.random()-0.5).slice(0,3);
  const deal = U.pick(MOTIVES);
  return {
    id: U.uuid(),
    name: genPlayerName(),
    pos: U.pick(GAME.POS),
    state: U.pick(GAME.STATES),
    stars, ovr, pot: U.rint(0,10),
    motives,
    dealbreaker: deal,
    stage:"open",
    committedTo:null,
    offers:[],
    delta:{},
    visitedBy:{},
    visitScheduled:{},
    visitPitch:{},
    swayLocked:false,
  };
}
function buildRecruitPool(n){ return Array.from({length:n}, ()=>makeRecruit()); }
function hash32(str){
  let h = 2166136261>>>0;
  for(let i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h>>>0;
}
function noiseRange(key,min,max){
  const h = hash32(key);
  const span = (max-min+1);
  return min + (h % span);
}
function capMap(obj, maxKeys){
  const keys = Object.keys(obj||{});
  if(keys.length<=maxKeys) return;
  keys.sort((a,b)=>Math.abs(obj[a]) - Math.abs(obj[b]));
  const drop = keys.slice(0, keys.length-maxKeys);
  for(const k of drop) delete obj[k];
}
function baseInterest(r, team, scoutLvl=0){
  const need = (team.needs?.[r.pos]||0);
  const needBoost = Math.min(14, need*4.5);
  const jitter = noiseRange(r.id+"|"+team.id, -12, 12);
  const scoutBoost = Math.round(scoutLvl * 2.0);

  const ok = meetsDeal(team, r.dealbreaker);
  const dbPenalty = ok ? 0 : 18;

  return U.clamp(team.prestige*0.55 + team.budget*0.22 + needBoost + scoutBoost + jitter - dbPenalty, 0, 100);
}
function interest(r, team, isUser=false){
  const coach = isUser ? S.userCoach : null;
  const scout = coach ? sumArchLevels(coach,"Recruiter")*0.55 : 0;
  const offerBonus = (r.offers?.includes(team.id) ? 7 : 0);
  const d = r.delta?.[team.id] ?? 0;
  return U.clamp(baseInterest(r, team, scout) + offerBonus + d, 0, 100);
}
function rankTeams(r){
  const arr = S.league.teams.map(t=>({id:t.id, val: interest(r, t, t.id===S.userTeamId)}));
  arr.sort((a,b)=>b.val-a.val);
  return arr;
}
function pitchFactor(r, team, pitchKey){
  const inMot = r.motives.includes(pitchKey);
  const letter = team.grades?.[pitchKey] || "F";
  const gradeBoost = letterVal(letter)/4;
  return (inMot?1.35:0.85) * (0.78 + gradeBoost*0.6);
}

/* ---------- Scholarships (projected) ---------- */
function projectedRecruitSlots(team){
  const projected = team.scholarshipsProjected ?? 0;
  const commits = team.recruiting?.commits?.length ?? 0;
  return Math.max(0, projected - commits);
}
function canOfferRecruit(team){ return projectedRecruitSlots(team) > 0; }

/* ---------- Offer sync + actions ---------- */
const ACTIONS = {
  soft: {label:"Soft", cost:40, baseEff:0.95},
  hard: {label:"Hard", cost:85, baseEff:1.45},
  sway: {label:"Sway", cost:70, baseEff:0.0},
  visit:{label:"Visit", cost:120, baseEff:1.95},
};
function hasUserOffer(team, recruit){
  const byRecruit = Array.isArray(recruit.offers) && recruit.offers.includes(team.id);
  const byBoard  = Array.isArray(team.recruiting?.offered) && team.recruiting.offered.includes(recruit.id);
  return !!(byRecruit || byBoard);
}
function ensureUserOffer(team, recruit){
  team.recruiting.offered ??= [];
  recruit.offers ??= [];
  if(!team.recruiting.offered.includes(recruit.id)) team.recruiting.offered.push(recruit.id);
  if(!recruit.offers.includes(team.id)) recruit.offers.push(team.id);
  if(recruit.offers.length>12) recruit.offers.length=12;
}
function offerRecruit(recruitId){
  const team = getUserTeam();
  const r = S.recruits.find(x=>x.id===recruitId);
  if(!team || !r) return;

  if(team.recruiting.offered.includes(recruitId)) return toast("Already Offered", "Offer already used.", "bad");
  if(!canOfferRecruit(team)){
    const sr = (team.roster||[]).filter(p=>p.year==="SR").length;
    return toast("No Projected Scholarships", `Projected slots = 0 (Seniors: ${sr}, Commits: ${(team.recruiting.commits||[]).length}).`, "bad");
  }
  ensureUserOffer(team, r);
  toast("Offer Sent", `${r.stars}★ ${r.pos} ${r.name}`, "good");
}

function queueModal(obj){ S.ui.modalQueue.push(obj); }
function clearModal(){ S.ui.modalQueue.shift(); }

function applyRecruitAction(team, coach, r, actionKey, pitchKey){
  const A = ACTIONS[actionKey];
  if(!A) return;

  const offered = hasUserOffer(team, r);
  if(actionKey!=="sway" && actionKey!=="visit" && !offered) return toast("Offer Needed", "Offer first.", "bad");
  if(actionKey==="visit" && !offered) return toast("Offer Needed", "Offer first.", "bad");

  const avail = team.recruiting.points - team.recruiting.spent;
  if(A.cost > avail) return toast("No Points", `Only ${avail} points left.`, "bad");

  if(actionKey==="visit"){
    r.visitedBy ??= {};
    r.visitScheduled ??= {};
    r.visitPitch ??= {};
    if(r.visitedBy[team.id]) return toast("Already Visited", "Visit already completed.", "bad");
    if(r.visitScheduled[team.id]!=null) return toast("Already Scheduled", "Visit already scheduled.", "bad");

    const okWeeks = [];
    // official visit window weeks 6-12 + offseason wk3
    if(S.phase==="season"){ for(let w=6; w<=GAME.REG_WEEKS; w++) okWeeks.push(w); }
    else { okWeeks.push(GAME.CFP_TITLE_WEEK+1+2); }

    queueModal({ type:"scheduleVisit", recruitId:r.id, pitch:pitchKey, cost:A.cost, weeks: okWeeks });
    return;
  }

  team.recruiting.spent += A.cost;
  team.recruiting.spentMap[r.id] = (team.recruiting.spentMap[r.id]||0)+A.cost;

  if(actionKey==="sway"){
    if(r.swayLocked) return toast("Sway Locked", "Only one sway attempt.", "bad");
    r.swayLocked = true;

    const ok = meetsDeal(team, r.dealbreaker);
    const recLevels = sumArchLevels(coach,"Recruiter");
    const odds = U.clamp(0.26 + recLevels*0.05 + (ok?0.05:-0.10) + U.rint(-6,6)/100, 0.10, 0.78);

    if(Math.random()<odds){
      if(!r.motives.includes(pitchKey)) r.motives[U.rint(0,2)] = pitchKey;
      const bump = 8 + recLevels*2 + U.rint(0,6);
      r.delta[team.id] = (r.delta[team.id]||0) + bump;
      toast("Sway Success", `${r.name} now cares about ${pitchKey.toUpperCase()}.`, "good");
    } else {
      const hit = 6 + U.rint(0,6);
      r.delta[team.id] = (r.delta[team.id]||0) - hit;
      toast("Sway Failed", `${r.name} (-${hit})`, "warn");
    }
    capMap(r.delta, 14);
    return;
  }

  const cur = interest(r, team, true);
  const ok = meetsDeal(team, r.dealbreaker);
  const match = pitchFactor(r, team, pitchKey);

  const closer = coach.skillsTree.Recruiter.rec_close.lvl || 0;
  const elite = coach.skillsTree.Recruiter.rec_elite.lvl || 0;
  const recLevels = sumArchLevels(coach,"Recruiter");

  const eff = (0.040 + (coach.rep.recruiting*0.00022) + (recLevels*0.010) + (elite*0.010))
    * A.baseEff * match * (ok?1.0:0.70);

  let gain = Math.round(A.cost * eff * (1 - cur/135));
  if(actionKey==="hard") gain += Math.round(closer*2);
  gain += U.rint(-1,2);

  r.delta[team.id] = (r.delta[team.id]||0) + gain;
  capMap(r.delta, 14);
  toast(`${A.label} Sell`, `+${gain} interest`, "good");
}

function applyScheduledVisitsForWeek(){
  const team = getUserTeam();
  if(!team) return;
  const wk = S.weekIndex;
  const offStart = GAME.CFP_TITLE_WEEK+1;
  const okWeek = (S.phase==="season" && wk>=6 && wk<=GAME.REG_WEEKS) || (S.phase==="offseason" && wk===offStart+2);
  if(!okWeek) return;

  const coach = S.userCoach;
  const visitKing = coach.skillsTree.Recruiter.rec_visits.lvl || 0;

  for(const r of S.recruits){
    if(r.stage!=="open") continue;
    const sched = r.visitScheduled?.[team.id];
    if(sched !== wk) continue;

    const pitchKey = r.visitPitch?.[team.id] || "brand";
    const cur = interest(r, team, true);
    const ok = meetsDeal(team, r.dealbreaker);
    const match = pitchFactor(r, team, pitchKey);

    const eff = (0.042 + coach.rep.recruiting*0.00022 + sumArchLevels(coach,"Recruiter")*0.010 + visitKing*0.010)
      * ACTIONS.visit.baseEff * match * (ok?1.0:0.70);

    const gain = Math.round(ACTIONS.visit.cost * eff * (1 - cur/135)) + U.rint(-1,2);
    r.delta[team.id] = (r.delta[team.id]||0) + gain;
    capMap(r.delta, 14);

    r.visitedBy[team.id] = true;
    delete r.visitScheduled[team.id];
    delete r.visitPitch[team.id];

    toast("Visit Completed", `${r.name} (+${gain})`, "good");
    recapVisit(r,gain);
  }
}

/* ---------- Portal ---------- */
function buildPortalPool(){
  const pool = [];
  const baseRate = U.clamp(S.settings.portalRate ?? 0.060, 0.0, 0.18);
  const cpuMult  = U.clamp(S.settings.cpuPortalMult ?? 1.0, 0.2, 2.5);
  const userMult = U.clamp(S.settings.userPortalMult ?? 1.0, 0.2, 2.5);

  for(const t of S.league.teams){
    for(const p of t.roster){
      if(p.year==="SR") continue;
      const need = (t.needs?.[p.pos]||0);
      const mult = (t.id===S.userTeamId ? userMult : cpuMult);
      const risk = (need<=0 ? 1.25 : 0.85) * (p.ovr < teamAvgOVR(t)-6 ? 1.15 : 1.0);
      if(Math.random() < baseRate * mult * risk){
        pool.push({ ...U.deepCopy(p), portalFrom:t.id, portalDelta:{} });
      }
    }
  }
  pool.sort(()=>Math.random()-0.5);
  S.portal.pool = pool.slice(0, GAME.PORTAL_POOL);
}
function portalInterest(player, team, isUser=false){
  const coach = isUser ? S.userCoach : null;
  const jitter = noiseRange(player.id+"|"+team.id, -15, 15);
  const d = player.portalDelta?.[team.id] ?? 0;
  const recruiter = coach ? sumArchLevels(coach,"Recruiter") : 0;
  return U.clamp(team.prestige*0.60 + recruiter*0.9 + jitter + d, 0, 100);
}
function portalSpend(playerId, pts){
  const t = getUserTeam();
  const p = S.portal.pool.find(x=>x.id===playerId);
  if(!t || !p) return;

  const avail = t.recruiting.points - t.recruiting.spent;
  if(pts>avail) return toast("No Points", `Only ${avail} pts left.`, "bad");

  t.recruiting.spent += pts;
  const cur = portalInterest(p, t, true);
  const rec = sumArchLevels(S.userCoach,"Recruiter");
  const eff = 0.052 + rec*0.010;
  const gain = Math.round(pts * eff * (1 - cur/140)) + U.rint(-1,2);

  p.portalDelta[t.id] = (p.portalDelta[t.id]||0) + gain;
  capMap(p.portalDelta, 12);
  toast("Portal Push", `+${gain} interest on ${p.name}.`, "good");
}

/* ---------- Retention ---------- */
function buildRetentionList(){
  const t = getUserTeam();
  if(!t) return;
  const avg = teamAvgOVR(t);
  const atRisk = [];
  for(const p of t.roster){
    if(p.year==="SR") continue;
    const need = (t.needs?.[p.pos]||0);
    const risk = (need<=0 ? 1 : 0) + (p.ovr < avg-6 ? 1 : 0) + (Math.random()<0.25 ? 1 : 0);
    if(risk>=2 && Math.random()<0.55) atRisk.push(p);
  }
  S.ui.retention.atRisk = atRisk.slice(0, 10).map(x=>x.id);
}
function persuasionAttemptsMax(){
  const c = S.userCoach;
  const base = 2;
  const perk = (c.skillsTree.Motivator.mot_retention.lvl||0);
  return base + Math.floor(perk/2);
}
function persuadeKeep(playerId){
  const t = getUserTeam();
  const c = S.userCoach;
  if(!t || !c) return;

  const used = S.ui.retention.attemptsUsed ?? 0;
  const max = persuasionAttemptsMax();
  if(used >= max) return toast("No Attempts", "You used all persuasion attempts.", "bad");

  const p = t.roster.find(x=>x.id===playerId);
  if(!p) return;

  const perk = (c.skillsTree.Motivator.mot_retention.lvl||0) + (c.skillsTree.Motivator.mot_master.lvl||0);
  const odds = U.clamp(0.45 + perk*0.08 + U.rint(-6,6)/100, 0.15, 0.92);

  S.ui.retention.attemptsUsed = used + 1;
  if(Math.random() < odds){
    S.ui.retention.atRisk = (S.ui.retention.atRisk||[]).filter(id=>id!==playerId);
    toast("Stayed!", `${p.name} decided to stay.`, "good");
  } else toast("Nope", `${p.name} still wants out.`, "warn");
}

/* ---------- Schedule + Sim ---------- */
function buildSeasonSchedule(teams){
  const weeks = [];
  const byConf = {};
  for(const t of teams) (byConf[t.conf] ??= []).push(t);

  for(let w=1; w<=GAME.REG_WEEKS; w++){
    const games = [];
    const used = new Set();
    const order = teams.slice().sort(()=>Math.random()-0.5);

    for(const a of order){
      if(used.has(a.id)) continue;
      const same = (byConf[a.conf]||[]).filter(x=>!used.has(x.id) && x.id!==a.id);
      const any = teams.filter(x=>!used.has(x.id) && x.id!==a.id);
      const pool = (Math.random()<0.62 && same.length)? same : any;
      if(!pool.length) continue;
      const b = U.pick(pool);
      used.add(a.id); used.add(b.id);
      games.push({home:a.id, away:b.id, played:false, scoreH:0, scoreA:0, confGame: (a.conf===b.conf)});
    }
    weeks.push({week:w, games});
  }
  return weeks;
}
function simGame(teamH, teamA){
  const tacOff = sumArchLevels(teamH.staff.HC,"Tactician")*0.5;
  const tacDef = sumArchLevels(teamA.staff.HC,"Tactician")*0.5;

  const base = 24, homeAdv = 2.8;
  let expH = base + ((teamH.off + teamAvgOVR(teamH)*0.2) - (teamA.def + teamAvgOVR(teamA)*0.2))*0.22 + homeAdv + U.rint(-9,+9) + tacOff;
  let expA = base + ((teamA.off + teamAvgOVR(teamA)*0.2) - (teamH.def + teamAvgOVR(teamH)*0.2))*0.22 + U.rint(-9,+9) - tacDef;
  expH = U.clamp(Math.round(expH), 3, 62);
  expA = U.clamp(Math.round(expA), 3, 62);
  if(expH===expA){ expH += U.rint(3,10); expA += U.rint(0,9); }

  // simple “box” for user stats
  const passY = U.clamp(Math.round(220 + (teamH.off-teamA.def)*6 + U.rint(-60,90)), 80, 520);
  const rushY = U.clamp(Math.round(140 + (teamH.off-teamA.def)*4 + U.rint(-50,80)), 30, 360);
  const recY = passY;
  const tkl = U.clamp(Math.round(55 + U.rint(-8,12)), 35, 90);
  const sack = U.clamp(Math.round(2 + (teamH.def-teamA.off)*0.08 + U.rint(-1,3)), 0, 9);
  const intl = U.clamp(Math.round(1 + (teamH.def-teamA.off)*0.05 + U.rint(-1,2)), 0, 5);

  return {scoreH:expH, scoreA:expA, box:{passY,rushY,recY,tkl,sack,int:intl}};
}
function applyResult(teamH, teamA, scoreH, scoreA, confGame){
  teamH.season.games++; teamA.season.games++;
  teamH.season.pf += scoreH; teamH.season.pa += scoreA;
  teamA.season.pf += scoreA; teamA.season.pa += scoreH;
  if(scoreH>scoreA){ teamH.season.w++; teamA.season.l++; if(confGame){teamH.season.confW++; teamA.season.confL++;} }
  else { teamA.season.w++; teamH.season.l++; if(confGame){teamA.season.confW++; teamH.season.confL++;} }
}

/* user stat allocation (very light, but enough for records) */
function applyBoxToUserPlayers(team, box){
  if(team.id !== S.userTeamId) return;
  const roster = team.roster.slice().sort((a,b)=>b.ovr-a.ovr);
  for(const p of roster) ensureStats(p);

  // pick key contributors by position
  const qb = roster.find(p=>p.pos==="QB") || roster[0];
  const rb = roster.find(p=>p.pos==="RB") || roster[1];
  const wr = roster.find(p=>p.pos==="WR") || roster[2];
  const lb = roster.find(p=>p.pos==="LB") || roster.find(p=>p.pos==="DL") || roster[3];
  const dl = roster.find(p=>p.pos==="DL") || roster[4];
  const cb = roster.find(p=>p.pos==="CB") || roster.find(p=>p.pos==="S") || roster[5];

  const addGP = (p)=>{ p.seasonStats.gp++; p.careerStats.gp++; };

  addGP(qb); addStats(qb.seasonStats,{passY:box.passY}); addStats(qb.careerStats,{passY:box.passY});
  addGP(rb); addStats(rb.seasonStats,{rushY:box.rushY}); addStats(rb.careerStats,{rushY:box.rushY});
  addGP(wr); addStats(wr.seasonStats,{recY:box.recY}); addStats(wr.careerStats,{recY:box.recY});
  addGP(lb); addStats(lb.seasonStats,{tkl:Math.round(box.tkl*0.45)}); addStats(lb.careerStats,{tkl:Math.round(box.tkl*0.45)});
  addGP(dl); addStats(dl.seasonStats,{sack:box.sack}); addStats(dl.careerStats,{sack:box.sack});
  addGP(cb); addStats(cb.seasonStats,{int:box.int}); addStats(cb.careerStats,{int:box.int});

  maybeBreakRecord("player","singlePassYds", box.passY, qb.name, team.name);
  maybeBreakRecord("player","singleRushYds", box.rushY, rb.name, team.name);
  maybeBreakRecord("player","singleRecYds", box.recY, wr.name, team.name);
  maybeBreakRecord("player","singleTackles", Math.round(box.tkl*0.45), lb.name, team.name);
  maybeBreakRecord("player","singleSacks", box.sack, dl.name, team.name);
  maybeBreakRecord("player","singleINT", box.int, cb.name, team.name);
}

/* ---------- Rankings + CFP ---------- */
function teamPollScore(t){
  const g = t.season.games||0;
  const winPct = g ? (t.season.w/g) : 0;
  const margin = g ? ((t.season.pf - t.season.pa)/g) : 0;
  return (winPct*100) + (margin*2.0) + (t.prestige*0.55) + (t.ovr*0.25);
}
function computeRankings(){
  const ranked = S.league.teams.slice().sort((a,b)=>teamPollScore(b)-teamPollScore(a));
  ranked.forEach((t,i)=>t.ranking=i+1);
}
function confChampionsTop5(){
  // pick conf champ by conf record then overall then poll score
  const byConf = {};
  for(const t of S.league.teams) (byConf[t.conf] ??= []).push(t);
  const champs = [];
  for(const [conf,list] of Object.entries(byConf)){
    const sorted = list.slice().sort((a,b)=>{
      const aPct = (a.season.confW+a.season.confL)? a.season.confW/(a.season.confW+a.season.confL) : 0;
      const bPct = (b.season.confW+b.season.confL)? b.season.confW/(b.season.confW+b.season.confL) : 0;
      if(bPct!==aPct) return bPct-aPct;
      if(b.season.w!==a.season.w) return b.season.w-a.season.w;
      return teamPollScore(b)-teamPollScore(a);
    });
    champs.push({conf, teamId: sorted[0]?.id});
  }
  // top 5 champs by poll score
  const champsScored = champs.map(x=>({conf:x.conf, teamId:x.teamId, score: teamPollScore(getTeam(x.teamId))}))
    .sort((a,b)=>b.score-a.score)
    .slice(0,5);
  return champsScored;
}
function buildCFPField(){
  computeRankings();
  const champs = confChampionsTop5();
  const champSet = new Set(champs.map(x=>x.teamId));
  const ranked = S.league.teams.slice().sort((a,b)=>a.ranking-b.ranking);

  // Autobids: 5 champs
  const field = [];
  for(const c of champs){ field.push({teamId:c.teamId, auto:true, conf:c.conf}); }

  // At-large: fill to 12 by ranking
  for(const t of ranked){
    if(field.length>=12) break;
    if(champSet.has(t.id)) continue;
    field.push({teamId:t.id, auto:false, conf:t.conf});
  }

  // Seed by ranking but ensure champs are included (already)
  const seeded = field.slice().sort((a,b)=>getTeam(a.teamId).ranking - getTeam(b.teamId).ranking);
  seeded.forEach((x,i)=>x.seed=i+1);

  // reorder to 1-12 by seed
  seeded.sort((a,b)=>a.seed-b.seed);

  // first round: 5v12,6v11,7v10,8v9 (host by higher seed)
  const r1 = [
    {a:seeded[4], b:seeded[11]},
    {a:seeded[5], b:seeded[10]},
    {a:seeded[6], b:seeded[9]},
    {a:seeded[7], b:seeded[8]},
  ].map(m=>({a:m.a, b:m.b, res:null}));

  const bracket = { field: seeded, r1, qf:[], sf:[], title:[], champ:null };
  S.post.cfp = bracket;

  const my = getUserTeam();
  if(my){
    const slot = seeded.find(x=>x.teamId===my.id);
    if(slot){
      queueModal({
        type:"selection",
        title:"CFP SELECTION",
        teamName: my.name,
        line: `Seed #${slot.seed} • ${slot.auto ? "Conference Champ Auto-Bid" : "At-Large"}`
      });
    }
  }
}
function simNeutral(teamA, teamB){
  // neutral-ish simulation
  const base = 24;
  let a = base + ((teamA.off + teamAvgOVR(teamA)*0.2) - (teamB.def + teamAvgOVR(teamB)*0.2))*0.22 + U.rint(-9,+9);
  let b = base + ((teamB.off + teamAvgOVR(teamB)*0.2) - (teamA.def + teamAvgOVR(teamA)*0.2))*0.22 + U.rint(-9,+9);
  a = U.clamp(Math.round(a), 3, 62);
  b = U.clamp(Math.round(b), 3, 62);
  if(a===b) a += U.rint(1,6);
  return {aScore:a, bScore:b, winId: a>b ? teamA.id : teamB.id};
}
function playCFPRound(week){
  const B = S.post.cfp;
  if(!B) return;
  const my = getUserTeam();
  const coach = S.userCoach;

  if(week===GAME.CFP_R1_WEEK){
    // simulate r1 (higher seed hosts, but we just treat as slight advantage)
    const winners = [];
    for(const m of B.r1){
      const A = getTeam(m.a.teamId), B2 = getTeam(m.b.teamId);
      const res = simNeutral(A,B2);
      m.res = res;
      winners.push(res.winId);
      if(my && (my.id===res.winId || my.id===A.id || my.id===B2.id)){
        if(res.winId===my.id){ coach.career.playoffWins++; addXP(coach, 40); }
      }
    }
    // QF: seeds 1-4 vs winners of (8/9)->1, (5/12)->4 etc standard-ish
    const s = B.field;
    const seed = (n)=>s[n-1].teamId;
    // Map winners by match order:
    const w5_12 = B.r1[0].res.winId;
    const w6_11 = B.r1[1].res.winId;
    const w7_10 = B.r1[2].res.winId;
    const w8_9  = B.r1[3].res.winId;
    B.qf = [
      {a:{teamId:seed(1), seed:1}, b:{teamId:w8_9}, res:null},
      {a:{teamId:seed(4), seed:4}, b:{teamId:w5_12}, res:null},
      {a:{teamId:seed(2), seed:2}, b:{teamId:w7_10}, res:null},
      {a:{teamId:seed(3), seed:3}, b:{teamId:w6_11}, res:null},
    ];
    return;
  }

  if(week===GAME.CFP_QF_WEEK){
    const winners=[];
    for(const m of B.qf){
      const A=getTeam(m.a.teamId), B2=getTeam(m.b.teamId);
      const res=simNeutral(A,B2); m.res=res; winners.push(res.winId);
      if(my && (my.id===res.winId || my.id===A.id || my.id===B2.id)){
        if(res.winId===my.id){ coach.career.playoffWins++; addXP(coach, 55); }
      }
    }
    B.sf = [
      {a:{teamId:winners[0]}, b:{teamId:winners[1]}, res:null},
      {a:{teamId:winners[2]}, b:{teamId:winners[3]}, res:null},
    ];
    return;
  }

  if(week===GAME.CFP_SF_WEEK){
    const winners=[];
    for(const m of B.sf){
      const A=getTeam(m.a.teamId), B2=getTeam(m.b.teamId);
      const res=simNeutral(A,B2); m.res=res; winners.push(res.winId);
      if(my && (my.id===res.winId || my.id===A.id || my.id===B2.id)){
        if(res.winId===my.id){ coach.career.playoffWins++; addXP(coach, 70); }
      }
    }
    B.title = [{a:{teamId:winners[0]}, b:{teamId:winners[1]}, res:null}];
    return;
  }

  if(week===GAME.CFP_TITLE_WEEK){
    const m=B.title[0];
    if(!m) return;
    const A=getTeam(m.a.teamId), B2=getTeam(m.b.teamId);
    const res=simNeutral(A,B2); m.res=res; B.champ=res.winId;
    if(my){
      if(res.winId===my.id){
        coach.career.natties += 1;
        coach.legacy += 120;
        addXP(coach, 200);
        toast("CHAMPIONS!", `${my.name} wins the National Championship!`, "good");
      } else toast("National Champion", `${getTeam(res.winId)?.name||"A team"} won it all.`, "warn");
    }
    return;
  }
}

/* ---------- Goals (role-specific simplified for HC only here) ---------- */
function setGoals(){
  const c=S.userCoach, t=getUserTeam();
  if(!c||!t) return;
  const prest = t.prestige;
  const winTarget = U.clamp(Math.round(4 + prest/10) + U.rint(-1,+1), 4, 11);
  const defTarget = U.clamp(Math.round(90 - prest*0.55), 15, 80); // defensive rank target (lower is better)

  // we compute "def rank" by points allowed per game
  c.goals = U.pick([
    {k:"wins", note:`Win ${winTarget}+ games`, winTarget},
    {k:"def", note:`Finish Top ${defTarget} in Defense (PPG allowed)`, defTarget},
    {k:"make", note:`Make the CFP`, makePlayoff:true},
  ]);
}
function leagueDefRank(teamId){
  const scored = S.league.teams.map(t=>({id:t.id, v: t.season.games? (t.season.pa/t.season.games) : 999}))
    .sort((a,b)=>a.v-b.v);
  return scored.findIndex(x=>x.id===teamId)+1;
}
function evalGoals(){
  const c=S.userCoach, t=getUserTeam();
  if(!c||!t||!c.goals) return;
  let met=false;
  if(c.goals.k==="wins") met = t.season.w >= c.goals.winTarget;
  if(c.goals.k==="def") met = leagueDefRank(t.id) <= c.goals.defTarget;
  if(c.goals.k==="make") met = !!S.post?.madeCFP;

  if(met){
    c.prestige=U.clamp(c.prestige+3,20,99);
    c.legacy+=25;
    addXP(c, 160);
    c.hotSeat=Math.max(0,c.hotSeat-1);
    toast("Goals Met", "Prestige +3, XP gained.", "good");
  } else {
    c.prestige=U.clamp(c.prestige-2,20,99);
    addXP(c, 60);
    c.hotSeat+=1;
    toast("Goals Missed", "Prestige -2, Hot Seat +1.", "warn");
  }
}

/* ---------- Jobs ---------- */
function makeContract(team){
  const salaryM = Math.round((team.budget*0.16 + team.prestige*0.10 + 2.2) * 100) / 100;
  const years = U.rint(3,6);
  const buyoutM = Math.round(salaryM * years * 0.70 * 100) / 100;
  return {salaryM, years, buyoutM};
}
function genJobOffers(){
  const coach = S.userCoach, cur = getUserTeam();
  if(!coach || !cur) return;
  const mv = coach.prestige + (cur.season.w*2.0) + Math.round(coach.legacy*0.05) + (coach.career.playoffWins||0)*6;
  const teams = S.league.teams.filter(t=>t.id!==cur.id).sort(()=>Math.random()-0.5);
  const offers = [];
  for(const t of teams){
    if(offers.length>=10) break;
    const diff = t.prestige - cur.prestige;
    const ok = (diff>=-28 && diff<=+22) || (t.prestige<=55 && Math.random()<0.12);
    if(!ok) continue;
    const chance = U.clamp(0.12 + (mv - t.prestige)*0.004 + Math.random()*0.12, 0.06, 0.55);
    if(Math.random()>chance) continue;
    offers.push({ id: U.uuid(), teamId: t.id, teamName: t.name, conf: t.conf, prestige: t.prestige, role: "HC", contract: makeContract(t) });
  }
  while(offers.length<3){
    const t = U.pick(teams);
    offers.push({ id:U.uuid(), teamId:t.id, teamName:t.name, conf:t.conf, prestige:t.prestige, role:"HC", contract: makeContract(t) });
  }
  S.jobs.offers = offers;
}
function acceptJob(offerId){
  const offer = S.jobs.offers.find(o=>o.id===offerId);
  const coach = S.userCoach;
  if(!offer || !coach) return;
  const team = getTeam(offer.teamId);
  if(!team) return;

  coach.contract = { ...offer.contract, teamId: team.id, teamName: team.name, role:"HC", startYear: S.year };
  coach.hotSeat = 0;
  S.userTeamId = team.id;
  placeUserCoachOnTeam(team, coach);
  setGoals();
  toast("Job Accepted", `HC at ${team.name}`, "good");
}

/* ---------- AI Recruiting Week (league + assistants) ---------- */
function applyDealbreakerDrift(){
  const t = getUserTeam();
  if(!t) return;
  computeGrades(t);
  for(const r of S.recruits){
    if(r.stage!=="open") continue;
    r.offers ??= [];
    if(!r.offers.includes(t.id)) continue;
    const ok = meetsDeal(t, r.dealbreaker);
    if(!ok){
      const drift = 3 + U.rint(0,4);
      r.delta[t.id] = (r.delta[t.id]||0) - drift;
      capMap(r.delta, 14);
    }
  }
}
function aiRecruitingWeek(){
  const open = S.recruits.filter(r=>r.stage==="open");

  for(const t of S.league.teams){
    recomputeScholarships(t); computeNeeds(t); computeGrades(t);
    t.recruiting.points = weeklyRecruitingPoints(t);
    t.recruiting.spent = 0;

    if(t.id===S.userTeamId) continue;

    const targets = open.slice().sort(()=>Math.random()-0.5).slice(0, 120)
      .sort((a,b)=>{
        const na=(t.needs?.[a.pos]||0), nb=(t.needs?.[b.pos]||0);
        if(nb!==na) return nb-na;
        if(b.stars!==a.stars) return b.stars-a.stars;
        return b.ovr-a.ovr;
      }).slice(0,14);

    for(const r of targets){
      r.offers ??= [];
      if(!r.offers.includes(t.id) && Math.random()<0.52){
        r.offers.push(t.id);
        if(r.offers.length>12) r.offers.length=12;
      }
      const avail = t.recruiting.points - t.recruiting.spent;
      if(avail<=0) break;

      const spend = Math.min(avail, Math.random()<0.45 ? U.rint(90,180) : U.rint(50,140));
      t.recruiting.spent += spend;

      const cur = interest(r, t, false);
      const pitch = U.pick(r.motives);
      const match = pitchFactor(r, t, pitch);
      const ok = meetsDeal(t, r.dealbreaker);

      const rep = (t.staff.HC.rep.recruiting + t.staff.A1.rep.recruiting + t.staff.A2.rep.recruiting)/3;
      const eff = (0.040 + rep*0.00022) * (Math.random()<0.45?1.28:0.92) * match * (ok?1.0:0.70);
      const gain = Math.round(spend * eff * (1 - cur/140)) + U.rint(-2,3);

      r.delta[t.id] = (r.delta[t.id]||0) + gain;
      capMap(r.delta, 14);
    }
  }

  // user assistants recruit too (background)
  const ut = getUserTeam();
  if(ut){
    const staffPts = Math.round(weeklyRecruitingPoints(ut)*0.70);
    let spent=0;
    const candidates = open.slice().sort(()=>Math.random()-0.5).slice(0, 200)
      .sort((a,b)=>{
        const na=(ut.needs?.[a.pos]||0), nb=(ut.needs?.[b.pos]||0);
        if(nb!==na) return nb-na;
        if(b.stars!==a.stars) return b.stars-a.stars;
        return b.ovr-a.ovr;
      }).slice(0, 22);

    for(const r of candidates){
      const avail = staffPts-spent;
      if(avail<=0) break;

      r.offers ??= [];
      if(!r.offers.includes(ut.id) && Math.random()<0.62){
        r.offers.push(ut.id);
        if(r.offers.length>12) r.offers.length=12;
      }

      const spendPts = Math.min(avail, U.rint(60,160));
      spent += spendPts;

      const cur = interest(r, ut, true);
      const pitch = U.pick(r.motives);
      const match = pitchFactor(r, ut, pitch);
      const ok = meetsDeal(ut, r.dealbreaker);
      const rep = ((ut.staff.A1?.rep?.recruiting??55)+(ut.staff.A2?.rep?.recruiting??55))/2;
      const perk = sumArchLevels(S.userCoach,"Recruiter")*0.006;

      const eff = (0.040 + rep*0.00022 + perk) * match * (ok?1.0:0.70);
      const gain = Math.round(spendPts * eff * (1 - cur/140)) + U.rint(-2,3);
      r.delta[ut.id] = (r.delta[ut.id]||0) + gain;
      capMap(r.delta, 14);
    }
  }

  applyDealbreakerDrift();
  applyScheduledVisitsForWeek();
}

/* ---------- Commitments + Signing ---------- */
function resolveCommitments(){
  for(const r of S.recruits){
    if(r.stage!=="open") continue;
    const ranked = rankTeams(r);
    const leaderId = ranked[0].id;
    const leaderTeam = getTeam(leaderId);
    const leaderVal = ranked[0].val;
    r.offers ??= [];

    const hasOffer = r.offers.includes(leaderId);
    const room = projectedRecruitSlots(leaderTeam) > 0;
    const ok = meetsDeal(leaderTeam, r.dealbreaker);
    if(!hasOffer || !room) continue;

    let p=0;
    if(S.phase==="season"){
      const wk = S.weekIndex;
      const late = wk>=9;
      if(leaderVal>=72) p = 0.07 + (leaderVal-70)*0.006;
      if(late && leaderVal>=66) p = 0.15 + (leaderVal-66)*0.007;
    } else if(S.phase==="offseason"){
      const offStart = GAME.CFP_TITLE_WEEK+1;
      if(S.weekIndex===offStart+2 && leaderVal>=60) p = 0.22 + (leaderVal-60)*0.007;
    }
    if(!ok) p *= 0.45;

    const my = getUserTeam();
    if(my && leaderId===my.id){
      const closer = S.userCoach.skillsTree.Recruiter.rec_close.lvl || 0;
      p *= (1 + closer*0.10);
    }

    if(Math.random()<U.clamp(p,0,0.65)){
      r.stage="committed";
      r.committedTo = leaderId;
      leaderTeam.recruiting.commits.push(r.id);

      if(my){
        const myRank = ranked.findIndex(x=>x.id===my.id)+1;
        const myInt = interest(r, my, true);
        if(leaderId===my.id){
          toast("Commitment!", `${r.stars}★ ${r.pos} ${r.name} committed.`, "good");
          queueModal({ type:"commit", title:"COMMITMENT!", teamName: my.name, recruit:{...r} });
          recapCommitWon(r);
        } else if(myRank>0 && myRank<=4 && myInt>=60){
          toast("Lost Recruit", `${r.name} → ${leaderTeam.name}`, "bad");
          recapCommitLost(r, leaderTeam.name);
        }
      }
    }
  }
}
function signAndProgress(){
  for(const r of S.recruits){
    if(r.stage!=="committed") continue;
    const t = getTeam(r.committedTo);
    r.stage="signed";
    const p = makePlayer({pos:r.pos, year:"FR", ovr: U.clamp(r.ovr + U.rint(-3,+3), 40, 95), pot:r.pot});
    p.name = r.name;
    ensureStats(p);
    t.roster.push(p);
  }

  for(const t of S.league.teams){
    t.yearlog.push({year:S.year, w:t.season.w, l:t.season.l});

    // graduate SR
    t.roster = t.roster.filter(p=>p.year!=="SR");
    // advance years
    for(const p of t.roster){
      if(p.year==="FR") p.year="SO";
      else if(p.year==="SO") p.year="JR";
      else if(p.year==="JR") p.year="SR";
      ensureStats(p);
    }

    // development
    const isUser = (t.id===S.userTeamId);
    const hc = t.staff.HC;
    const devBase = 1 + U.rint(0,2);
    const devPerk = isUser ? ( (hc.skillsTree.Motivator.mot_dev.lvl||0)*0.8 + (hc.skillsTree.Motivator.mot_master.lvl||0)*1.2 ) : (sumArchLevels(hc,"Motivator")*0.35);
    for(const p of t.roster){
      const grow = devBase + Math.round(devPerk*0.6) + U.rint(0,1);
      p.ovr = U.clamp(p.ovr + grow, 35, 99);
    }

    // cut if >85
    if(t.roster.length > GAME.MAX_SCHOLARSHIPS){
      t.roster.sort((a,b)=>b.ovr-a.ovr);
      t.roster = t.roster.slice(0, GAME.MAX_SCHOLARSHIPS);
    }

    recomputeScholarships(t);
    computeNeeds(t);
    computeGrades(t);

    t.recruiting.offered=[];
    t.recruiting.spentMap={};
    t.recruiting.commits=[];
    t.recruiting.classSlots=25;
    t.recruiting.spent=0;

    resetSeasonStats(t);
  }

  const team = getUserTeam();
  const coach = S.userCoach;
  if(team && coach){
    maybeBreakRecord("coach","careerWins", coach.career.wins||0, coach.name, team.name);
    maybeBreakRecord("coach","nationalTitles", coach.career.natties||0, coach.name, team.name);
    maybeBreakRecord("coach","playoffWins", coach.career.playoffWins||0, coach.name, team.name);
    upsertLegacyEntry(coach.name, team.name, calcLegacyScore(coach), `HC • ${team.conf}`);
  }
}

/* ---------- Sim season week games ---------- */
function simWeekGames(){
  const sched = S.league.schedule[S.weekIndex-1];
  if(!sched) return;

  const my = getUserTeam();

  for(const g of sched.games){
    if(g.played) continue;
    const h = getTeam(g.home), a = getTeam(g.away);
    const res = simGame(h,a);

    g.played=true; g.scoreH=res.scoreH; g.scoreA=res.scoreA;

    applyResult(h,a,res.scoreH,res.scoreA,g.confGame);

    recomputeScholarships(h); recomputeScholarships(a);
    computeNeeds(h); computeNeeds(a);
    computeGrades(h); computeGrades(a);

    if(my && (h.id===my.id || a.id===my.id)){
      const myScore = (h.id===my.id) ? res.scoreH : res.scoreA;
      const opScore = (h.id===my.id) ? res.scoreA : res.scoreH;
      const opp = (h.id===my.id) ? a : h;
      const line = `${my.name} ${myScore}-${opScore} ${opp.name}`;
      recapAddGame(line);

      applyBoxToUserPlayers(my, res.box);

      if(myScore>opScore){
        S.userCoach.career.wins++; addXP(S.userCoach, 22);
        toast("Win", line, "good");
      } else {
        S.userCoach.career.losses++; addXP(S.userCoach, 12);
        toast("Loss", line, "bad");
      }
    }
  }
}

/* ---------- Conf champ + CFP timeline ---------- */
function simConferenceChampWeek(){
  computeRankings();
  // conference champ game: top 2 by conf record in each conf
  const byConf = {};
  for(const t of S.league.teams) (byConf[t.conf] ??= []).push(t);

  for(const [conf,list] of Object.entries(byConf)){
    if(list.length<2) continue;
    const sorted = list.slice().sort((a,b)=>{
      const aPct=(a.season.confW+a.season.confL)? a.season.confW/(a.season.confW+a.season.confL):0;
      const bPct=(b.season.confW+b.season.confL)? b.season.confW/(b.season.confW+b.season.confL):0;
      if(bPct!==aPct) return bPct-aPct;
      if(b.season.w!==a.season.w) return b.season.w-a.season.w;
      return teamPollScore(b)-teamPollScore(a);
    });
    const t1=sorted[0], t2=sorted[1];
    const res=simNeutral(t1,t2);
    const champ=getTeam(res.winId);
    champ.prestige = U.clamp(champ.prestige+1, 35, 99); // small bump
  }
  toast("Conference Champs", "Championship games complete.", "good");
}
function advanceCFPWeeks(){
  if(S.weekIndex===GAME.CFP_R1_WEEK){
    buildCFPField();
    // determine if user made CFP
    const my = getUserTeam();
    S.post.madeCFP = !!(my && S.post.cfp.field.some(x=>x.teamId===my.id));
    return;
  }
  playCFPRound(S.weekIndex);
  if(S.weekIndex===GAME.CFP_TITLE_WEEK){
    // wrap season
    const coach=S.userCoach, team=getUserTeam();
    if(team && coach){
      maybeBreakRecord("coach","careerWins", coach.career.wins, coach.name, team.name);
      maybeBreakRecord("coach","nationalTitles", coach.career.natties, coach.name, team.name);
      maybeBreakRecord("coach","playoffWins", coach.career.playoffWins, coach.name, team.name);
      upsertLegacyEntry(coach.name, team.name, calcLegacyScore(coach), `HC • ${team.conf}`);
    }
  }
}

/* ---------- Advance engine ---------- */
function advance(){
  if(!S) return;
  if(S.phase==="setup") return toast("Setup Required", "Create coach + pick team first.", "bad");
  if(S.ui.modalQueue?.length) return;

  const offStart = GAME.CFP_TITLE_WEEK+1;

  if(S.phase==="season" && S.weekIndex===0){
    resetForNewSeason();
    setGoals();
    S.weekIndex = 1;
    toast("Season Start", `Year ${S.year} begins.`, "good");
    return;
  }

  // regular season weeks
  if(S.phase==="season" && S.weekIndex>=1 && S.weekIndex<=GAME.REG_WEEKS){
    initWeekRecap();
    aiRecruitingWeek();
    simWeekGames();
    resolveCommitments();
    S.weekIndex += 1;
    if(S.weekIndex===GAME.CONF_CHAMP_WEEK) toast("Next", "Conference title week is here.", "good");
    return;
  }

  // conf championship week
  if(S.phase==="season" && S.weekIndex===GAME.CONF_CHAMP_WEEK){
    initWeekRecap();
    simConferenceChampWeek();
    S.weekIndex = GAME.CFP_R1_WEEK;
    return;
  }

  // CFP rounds
  if(S.phase==="season" && S.weekIndex>=GAME.CFP_R1_WEEK && S.weekIndex<=GAME.CFP_TITLE_WEEK){
    initWeekRecap();
    advanceCFPWeeks();
    S.weekIndex += 1;

    if(S.weekIndex===offStart){
      S.phase="offseason";
      buildRetentionList();
      buildPortalPool();
      genJobOffers();
      const myTeam=getUserTeam();
      if(myTeam){
        myTeam.recruiting.points = weeklyRecruitingPoints(myTeam);
        myTeam.recruiting.spent = 0;
      }
      toast("Offseason", "Jobs + Portal are live.", "good");
    }
    return;
  }

  // offseason
  if(S.phase==="offseason"){
    const wk=S.weekIndex;

    if(wk===offStart){
      S.weekIndex = offStart+1;
      toast("Offseason Week 2", "Portal continues.", "good");
      return;
    }
    if(wk===offStart+1){
      S.weekIndex = offStart+2;
      toast("Offseason Week 3", "Late recruiting + visits.", "good");
      return;
    }
    if(wk===offStart+2){
      initWeekRecap();
      aiRecruitingWeek();
      resolveCommitments();
      S.weekIndex = offStart+3;
      toast("Offseason Week 4", "Signing + progression next.", "good");
      return;
    }
    if(wk===offStart+3){
      evalGoals();
      signAndProgress();

      S.year += 1;
      S.phase = "season";
      S.weekIndex = 0;

      toast("New Year", `Welcome to ${S.year}.`, "good");
      return;
    }
  }
}

function renderSchedule(){
  const t = getUserTeam();
  if(!t) return `<div class="card"><h2>Schedule</h2><div class="muted">Pick a team first.</div></div>`;

  const items=[];
  for(let w=1; w<=GAME.REG_WEEKS; w++){
    const sched = S.league.schedule[w-1];
    const g = (sched?.games||[]).find(x=>x.home===t.id || x.away===t.id);
    if(!g){ items.push({w, opp:"BYE", res:"—"}); continue; }
    const home=getTeam(g.home), away=getTeam(g.away);
    const opp = (g.home===t.id) ? `${away.name} (H)` : `${home.name} (A)`;
    const res = g.played ? ((g.home===t.id)? `${g.scoreH}-${g.scoreA}` : `${g.scoreA}-${g.scoreH}`) : "—";
    items.push({w, opp, res});
  }

  return `
    <div class="card">
      <div class="rowBetween">
        <h2>${U.safe(t.name)} Schedule (Year ${S.year})</h2>
        <span class="badge bAcc">12 weeks</span>
      </div>
      <div class="sep"></div>
      <div class="list">
        ${items.map(x=>`
          <div class="itemCard">
            <div class="itemTop">
              <div class="itemTitle">Week ${x.w}</div>
              <span class="badge bAcc2">${U.safe(x.res)}</span>
            </div>
            <div class="itemMeta">${U.safe(x.opp)}</div>
          </div>
        `).join("")}

          <div class="itemTitle">Postseason Timeline</div>
          <div class="itemMeta">Week 13: Conf Champs • Week 14: CFP R1 • Week 15: QF • Week 16: SF • Week 17: Title</div>
        </div>
      </div>
    </div>
  `;
}

function renderRecruiting(){
  const t = getUserTeam();
  const c = S.userCoach;
  if(!t || !c) return `<div class="card"><h2>Recruiting</h2><div class="muted">Finish setup first.</div></div>`;

  const offStart = GAME.CFP_TITLE_WEEK+1;
  const hsOpen = (S.phase==="season" && S.weekIndex>=1 && S.weekIndex<=GAME.REG_WEEKS);
  const lateOpen = (S.phase==="offseason" && S.weekIndex===offStart+2);
  if(!hsOpen && !lateOpen) return `<div class="card"><h2>Recruiting</h2><div class="muted">Recruiting runs Weeks 1–12. Late recruiting runs Offseason Wk3.</div></div>`;

  recomputeScholarships(t); computeNeeds(t); computeGrades(t);

  const f = S.ui.recruitFilters;
  const remain = t.recruiting.points - t.recruiting.spent;
  const projSlots = projectedRecruitSlots(t);

  let list = S.recruits.filter(r=>r.stage==="open");
  if(f.targetsOnly){
    const offeredSet = new Set(t.recruiting.offered||[]);
    list = list.filter(r=>offeredSet.has(r.id));
  }
  if(f.pos) list = list.filter(r=>r.pos===f.pos);
  if(f.state) list = list.filter(r=>r.state===f.state);
  if(f.stars) list = list.filter(r=>r.stars>=parseInt(f.stars,10));

  if(f.sort==="ovr") list.sort((a,b)=>b.ovr-a.ovr);
  else if(f.sort==="stars") list.sort((a,b)=>b.stars-a.stars || b.ovr-a.ovr);
  else {
    list.sort((a,b)=>{
      const ra = rankTeams(a).findIndex(x=>x.id===t.id)+1;
      const rb = rankTeams(b).findIndex(x=>x.id===t.id)+1;
      return ra-rb;
    });
  }
  list = list.slice(0, 90);

  return `
    <div class="card">
      <div class="rowBetween">
        <h2>Recruiting Board</h2>
        <span class="badge bAcc">Points ${remain}/${t.recruiting.points}</span>
      </div>

      <div class="row" style="margin-top:8px">
        <span class="badge bAcc">SCH NOW: ${t.scholarshipsNow}</span>
        <span class="badge bAcc2">SCH PROJ: ${t.scholarshipsProjected}</span>
        <span class="badge bGood">PROJ SLOTS: ${projSlots}</span>
        <span class="badge bWarn">COMMITS: ${(t.recruiting.commits||[]).length}</span>
      </div>

      <div class="sep"></div>
      <div class="twoCol">
        <div>
          <label>Position</label>
          <select id="rf_pos">
            <option value="">All</option>
            ${GAME.POS.map(p=>`<option value="${p}" ${f.pos===p?"selected":""}>${p}</option>`).join("")}
          </select>
        </div>
        <div>
          <label>State</label>
          <select id="rf_state">
            <option value="">All</option>
            ${GAME.STATES.map(s=>`<option value="${s}" ${f.state===s?"selected":""}>${s}</option>`).join("")}
          </select>
        </div>
        <div>
          <label>Min Stars</label>
          <select id="rf_stars">
            <option value="">Any</option>
            ${[1,2,3,4,5].map(x=>`<option value="${x}" ${f.stars==x?"selected":""}>${x}★+</option>`).join("")}
          </select>
        </div>
        <div>
          <label>Sort</label>
          <select id="rf_sort">
            <option value="rank" ${f.sort==="rank"?"selected":""}>Your Rank</option>
            <option value="ovr" ${f.sort==="ovr"?"selected":""}>OVR</option>
            <option value="stars" ${f.sort==="stars"?"selected":""}>Stars</option>
          </select>
        </div>
      </div>

      <div class="row" style="margin-top:10px; align-items:flex-end">
        <div style="flex:1; min-width:220px">
          <label>Targets</label>
          <select id="rf_targets">

        </div>
        <div style="flex:1; min-width:220px">
          <label>Pitch</label>
          <select id="rf_pitch">
            ${MOTIVES.map(k=>`<option value="${k}" ${f.pitch===k?"selected":""}>${k.toUpperCase()}</option>`).join("")}
          </select>
        </div>
      </div>

      <div class="row" style="margin-top:10px">
        <button data-act="rf_apply" class="btnAccent">Apply Filters</button>
        <button data-act="rf_clear">Clear</button>
      </div>

      <div class="sep"></div>

      <div class="list">
        ${list.map(r=>{
          const ranked = rankTeams(r);
          const myRank = ranked.findIndex(x=>x.id===t.id)+1;
          const myInt = interest(r, t, true);
          const leaderTeam = getTeam(ranked[0].id);

          const offered = hasUserOffer(t, r);
          const scheduledWeek = r.visitScheduled?.[t.id];
          const visited = !!r.visitedBy?.[t.id];

          const ok = meetsDeal(t, r.dealbreaker);

            ? `Visited`
            : (scheduledWeek!=null ? `Scheduled: ${weekName(scheduledWeek)}` : `Not Scheduled`);

          const offerDisabled = offered || !canOfferRecruit(t);
          const offerLabel = offered ? "Offered" : "Offer";

          const canScheduleVisit = (!visited && scheduledWeek==null && remain>=ACTIONS.visit.cost && offered);
          const motives = r.motives.map(k=>`${k.toUpperCase()}(${t.grades[k]||"F"})`).join(" • ");

          return `
            <div class="itemCard">
              <div class="itemTop">
                <div>
                  <div class="itemTitle">${"★".repeat(r.stars)} <span class="badge bAcc">OVR ${r.ovr}</span> ${U.safe(r.name)}</div>
                  <div class="itemMeta">

              <div class="itemMeta">Motives: ${U.safe(motives)}</div>
              <div class="itemMeta" style="margin-top:6px">
                <span class="badge ${dbBadge}">DEAL: ${U.safe(r.dealbreaker.toUpperCase())} (${U.safe(t.grades[r.dealbreaker]||"F")})</span>
                <span class="badge bAcc2">${U.safe(visitText)}</span>
              </div>

              <div class="actionLine">
                <button data-act="offer" data-id="${r.id}" ${offerDisabled?"disabled":""}>${offerLabel}</button>
                <button class="btnAccent" data-act="sell" data-id="${r.id}" data-kind="soft" ${remain<ACTIONS.soft.cost?"disabled":""}>Soft</button>
                <button class="btnWarn" data-act="sell" data-id="${r.id}" data-kind="hard" ${remain<ACTIONS.hard.cost?"disabled":""}>Hard</button>
                <button data-act="sell" data-id="${r.id}" data-kind="sway" ${remain<ACTIONS.sway.cost?"disabled":""}>Sway</button>
                <button class="btnGood" data-act="sell" data-id="${r.id}" data-kind="visit" ${canScheduleVisit?"":"disabled"}>Visit</button>
              </div>
            </div>
          `;
        }).join("")}
      </div>

      <div class="hint">Offer/actions are synced; you won’t get false “offer needed” blocks.</div>
    </div>
  `;
}

function renderPortal(){

  if(f.pos) list = list.filter(p=>p.pos===f.pos);

  if(f.sort==="ovr") list.sort((a,b)=>b.ovr-a.ovr);
  else list.sort((a,b)=>portalInterest(b,t,true)-portalInterest(a,t,true));
  list = list.slice(0, 70);

  const atRiskIds = new Set(S.ui.retention.atRisk||[]);
  const atRisk = t.roster.filter(p=>atRiskIds.has(p.id));

  return `
    <div class="card">
      <div class="rowBetween">
        <h2>Transfer Portal</h2>
        <span class="badge bAcc">Points ${remain}/${t.recruiting.points}</span>
      </div>

      <div class="sep"></div>
      <div class="itemCard" style="border-color:rgba(181,140,255,.45)">
        <div class="rowBetween">
          <div>
            <b>Retention</b>
            <div class="muted mini">Attempts: ${S.ui.retention.attemptsUsed}/${persuasionAttemptsMax()}</div>
          </div>
          <span class="badge bAcc2">${U.safe(weekName(S.weekIndex))}</span>
        </div>
        <div class="divider"></div>

        <div class="list">
          ${atRisk.length ? atRisk.map(p=>`
            <div class="itemCard">
              <div class="itemTop">
                <div>
                  <div class="itemTitle">${U.safe(p.name)} <span class="badge bAcc2">${p.pos}</span> <span class="badge bAcc">OVR ${p.ovr}</span></div>
                  <div class="itemMeta">${p.year} • At risk of transfer</div>
                </div>
              </div>
              <div class="actionLine">
                <button class="btnGood" data-act="persuade" data-id="${p.id}">Persuade</button>
              </div>
            </div>
          `).join("") : `<div class="muted">No major retention threats right now.</div>`}
        </div>
      </div>

      <div class="sep"></div>
      <div class="twoCol">
        <div>
          <label>Position</label>
          <select id="pf_pos">
            <option value="">All</option>
            ${GAME.POS.map(p=>`<option value="${p}" ${f.pos===p?"selected":""}>${p}</option>`).join("")}
          </select>
        </div>
        <div>
          <label>Sort</label>
          <select id="pf_sort">
            <option value="ovr" ${f.sort==="ovr"?"selected":""}>OVR</option>
            <option value="interest" ${f.sort==="interest"?"selected":""}>Interest</option>
          </select>
        </div>
      </div>
      <div class="row" style="margin-top:10px">
        <button data-act="pf_apply" class="btnAccent">Apply</button>
        <button data-act="pf_clear">Clear</button>
      </div>

      <div class="sep"></div>

      <div class="list">
        ${list.map(p=>{
          const myInt = portalInterest(p,t,true);
          const from = getTeam(p.portalFrom)?.name || "—";
          return `
            <div class="itemCard">
              <div class="itemTop">
                <div>
                  <div class="itemTitle">${U.safe(p.name)} <span class="badge bAcc2">${p.pos}</span> <span class="badge bAcc">OVR ${p.ovr}</span></div>
                  <div class="itemMeta">${p.year} • From: ${U.safe(from)}</div>
                </div>
              </div>
              <div style="margin-top:8px">
                <div class="progress"><div class="bar" style="width:${myInt}%;"></div></div>
                <div class="itemMeta">Interest: ${myInt}/100</div>
              </div>
              <div class="actionLine">
                <button data-act="ppts" data-id="${p.id}" data-pts="75" ${remain<75?"disabled":""}>+75</button>
                <button data-act="ppts" data-id="${p.id}" data-pts="125" ${remain<125?"disabled":""}>+125</button>
              </div>
            </div>
          `;
        }).join("")}
      </div>
    </div>
  `;
}
