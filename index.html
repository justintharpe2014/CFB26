<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>CFB Dynasty Sim (Offline)</title>
  <style>
    :root{
      --bg:#0a0f16; --text:#eaf2ff; --muted:#a8bbd6;
      --line:#263a55;
      --good:#4ee08a; --warn:#ffd166; --bad:#ff5d5d;
      --accent:#63b3ff; --accent2:#b58cff; --accent3:#7CFFB2;
      --shadow: 0 14px 34px rgba(0,0,0,.38);
      --safeTop: env(safe-area-inset-top, 0px); --safeBot: env(safe-area-inset-bottom, 0px);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(99,179,255,.17), transparent 60%),
        radial-gradient(900px 700px at 85% 0%, rgba(181,140,255,.13), transparent 55%),
        radial-gradient(900px 800px at 40% 90%, rgba(124,255,178,.08), transparent 55%),
        var(--bg);
      color:var(--text);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      overflow-x:hidden;
    }
    html, body { overflow-x: hidden; }
    main, .card, .list, .itemCard { max-width: 100%; }

    header{
      position:sticky; top:0; z-index:60;
      background: linear-gradient(180deg, rgba(10,15,22,.96), rgba(10,15,22,.78));
      backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(38,58,85,.65);
      padding: calc(6px + var(--safeTop)) 10px 6px;
    }
    .topRow{display:flex; gap:10px; align-items:center; justify-content:space-between; max-width:1120px; margin:0 auto;}
    .leftHdr{display:flex; align-items:center; gap:10px; min-width:0}
    .brand{display:flex; flex-direction:column; gap:1px; min-width:0}
    .brand .title{font-weight:950; letter-spacing:.4px; font-size:13px; display:flex; align-items:center; gap:8px; white-space:nowrap;}
    .pill{
      padding:2px 7px;
      border:1px solid rgba(99,179,255,.40);
      background: rgba(99,179,255,.12);
      border-radius:999px;
      font-size:10px; color:var(--accent); font-weight:900;
    }
    .sub{
      color:var(--muted); font-size:11px; line-height:1.2;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      max-width: 64vw;
    }
    .topActions{display:flex; gap:8px; align-items:center; justify-content:flex-end; flex:0 0 auto;}

    button{
      border:1px solid rgba(38,58,85,.92);
      background: linear-gradient(180deg, rgba(18,28,43,.97), rgba(15,22,32,.95));
      color:var(--text);
      border-radius:12px; padding:9px 10px;
      font-weight:900; font-size:12px;
      cursor:pointer; box-shadow: 0 8px 18px rgba(0,0,0,.16); user-select:none;
      transition: transform .05s ease, border-color .15s ease, filter .15s ease;
      touch-action: manipulation;
      white-space:nowrap;
    }
    button:hover{ border-color: rgba(99,179,255,.65); }
    button:active{ transform: translateY(1px); }
    button:disabled{opacity:.45; cursor:not-allowed; filter:saturate(.6);}
    .btnAccent{border-color: rgba(99,179,255,.68); background: linear-gradient(180deg, rgba(99,179,255,.22), rgba(15,22,32,.95));}
    .btnGood{border-color: rgba(78,224,138,.58); background: linear-gradient(180deg, rgba(78,224,138,.18), rgba(15,22,32,.95));}
    .btnDanger{border-color: rgba(255,93,93,.58); background: linear-gradient(180deg, rgba(255,93,93,.18), rgba(15,22,32,.95));}
    .btnWarn{border-color: rgba(255,209,102,.55); background: linear-gradient(180deg, rgba(255,209,102,.14), rgba(15,22,32,.95));}
    .iconBtn{
      width:40px; height:40px; padding:0;
      display:inline-flex; align-items:center; justify-content:center;
      border-radius:12px;
    }

    main{ max-width:1120px; margin:0 auto; padding:12px 12px calc(18px + var(--safeBot)); }
    .grid{display:grid; grid-template-columns: 1.15fr .85fr; gap:12px;}
    @media (max-width: 920px){.grid{grid-template-columns:1fr}}

    .card{
      background: linear-gradient(180deg, rgba(18,28,43,.92), rgba(12,18,26,.92));
      border:1px solid rgba(38,58,85,.82);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding:12px;
    }
    .card h2{margin:0 0 8px; font-size:14px; letter-spacing:.35px;}
    .muted{color:var(--muted)}
    .sep{height:1px; background:rgba(38,58,85,.75); margin:10px 0;}
    .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
    .rowBetween{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;}
    .chip{
      background: rgba(22,36,55,.92);
      border:1px solid rgba(38,58,85,.82);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px; font-weight:900;
      display:inline-flex; gap:6px; align-items:center;
    }
    .chip .k{color:var(--muted); font-weight:950; font-size:11px; letter-spacing:.2px;}

    input,select,textarea{
      width:100%;
      border-radius:12px;
      border:1px solid rgba(38,58,85,.92);
      background: rgba(10,14,19,.78);
      color:var(--text);
      padding:10px;
      outline:none;
      font-size:13px;
    }
    label{font-size:12px; color:var(--muted); font-weight:950; display:block; margin:8px 0 6px;}
    .hint{font-size:11px; color:var(--muted); margin-top:6px; line-height:1.28;}
    .badge{
      padding:3px 8px; border-radius:999px;
      font-size:11px; font-weight:950;
      border:1px solid rgba(38,58,85,.88);
      background: rgba(22,36,55,.75);
      display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
    }
    .bGood{border-color: rgba(78,224,138,.52); color: rgba(170,255,212,1); background: rgba(78,224,138,.11);}
    .bBad{border-color: rgba(255,93,93,.52); color: rgba(255,182,182,1); background: rgba(255,93,93,.10);}
    .bWarn{border-color: rgba(255,209,102,.52); color: rgba(255,241,192,1); background: rgba(255,209,102,.12);}
    .bAcc{border-color: rgba(99,179,255,.62); color: rgba(200,230,255,1); background: rgba(99,179,255,.12);}
    .bAcc2{border-color: rgba(181,140,255,.62); color: rgba(230,212,255,1); background: rgba(181,140,255,.12);}

    .progress{height:10px; border-radius:999px; border:1px solid rgba(38,58,85,.88); background: rgba(10,14,19,.82); overflow:hidden;}
    .bar{height:100%; width:0%; background: linear-gradient(90deg, rgba(99,179,255,.95), rgba(181,140,255,.95));}

    .toasts{position:fixed; top: calc(52px + var(--safeTop)); right: 10px; z-index: 90; display:flex; flex-direction:column; gap:8px; max-width: 92vw; pointer-events:none;}
    .toast{pointer-events:none; background: rgba(18,28,43,.92); border:1px solid rgba(38,58,85,.92); border-left:5px solid rgba(99,179,255,.85); border-radius: 12px; padding: 10px 12px; box-shadow: var(--shadow); font-size: 12px; line-height: 1.25; max-width: 440px;}
    .toast.good{border-left-color: rgba(78,224,138,.92);}
    .toast.bad{border-left-color: rgba(255,93,93,.92);}
    .toast.warn{border-left-color: rgba(255,209,102,.92);}
    .toast .t{font-weight:950; margin-bottom:2px;}
    .toast .s{color:var(--muted);}

    .twoCol{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    @media (max-width: 640px){ .twoCol{grid-template-columns:1fr;} .sub{max-width:56vw} }
    .right{text-align:right;}
    .mini{font-size:11px}

    .overlay{
      position:fixed; inset:0; z-index:140;
      background: rgba(0,0,0,.58);
      backdrop-filter: blur(6px);
      display:flex; align-items:center; justify-content:center;
      padding: 14px;
    }
    .modal{
      width:min(720px, 96vw);
      border-radius: 18px;
      border:1px solid rgba(38,58,85,.92);
      box-shadow: 0 20px 80px rgba(0,0,0,.55);
      background:
        radial-gradient(900px 300px at 10% 0%, rgba(99,179,255,.22), transparent 55%),
        radial-gradient(900px 300px at 90% 0%, rgba(181,140,255,.18), transparent 55%),
        linear-gradient(180deg, rgba(18,28,43,.96), rgba(12,18,26,.96));
      padding: 14px;
      max-height: calc(92vh - var(--safeTop) - var(--safeBot));
      overflow:auto;
      -webkit-overflow-scrolling: touch;
    }
    .hero{
      border-radius: 14px;
      border:1px solid rgba(99,179,255,.42);
      background: linear-gradient(90deg, rgba(99,179,255,.20), rgba(181,140,255,.18));
      padding: 12px;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    .hero .big{font-size: 15px; font-weight: 1000; letter-spacing:.2px; line-height:1.15;}
    .hero .subt{font-size: 12px; font-weight: 950; color: rgba(255,241,192,1);}
    .hero .logo{font-size: 28px; filter: drop-shadow(0 10px 20px rgba(0,0,0,.35));}

    .drawerOverlay{
      position:fixed; inset:0; z-index:120;
      background: rgba(0,0,0,.42);
      backdrop-filter: blur(6px);
      display:none;
    }
    .drawerOverlay.open{display:block;}
    .drawer{
      position:fixed; top:0; left:0;
      height:100%;
      width:min(340px, 90vw);
      padding: calc(10px + var(--safeTop)) 12px 12px;
      background: linear-gradient(180deg, rgba(18,28,43,.98), rgba(12,18,26,.98));
      border-right:1px solid rgba(38,58,85,.82);
      box-shadow: 24px 0 80px rgba(0,0,0,.55);
      transform: translateX(-105%);
      transition: transform .18s ease;
      display:flex; flex-direction:column; gap:10px;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
    }
    .drawerOverlay.open .drawer{transform: translateX(0);}
    .drawerHdr{display:flex; align-items:center; justify-content:space-between; gap:10px;}
    .drawerTitle{font-weight:1000; letter-spacing:.3px;}
    .navList{display:flex; flex-direction:column; gap:8px; margin-top:6px;}
    .navItem{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      padding:10px 10px;
      border-radius:14px;
      border:1px solid rgba(38,58,85,.86);
      background: rgba(18,28,43,.62);
      color:var(--muted);
      cursor:pointer; user-select:none; touch-action: manipulation;
    }
    .navItem .l{display:flex; align-items:center; gap:10px; font-weight:950; color:inherit;}
    .navItem.active{color:var(--text); border-color: rgba(99,179,255,.68); background: rgba(99,179,255,.12);}

    @media (max-width: 520px){
      .hideOnPhone{display:none !important;}
      .sub{max-width:56vw}
    }

    .list{display:flex; flex-direction:column; gap:10px;}
    .itemCard{
      border-radius: 14px;
      border: 1px solid rgba(38,58,85,.82);
      background: linear-gradient(180deg, rgba(18,28,43,.82), rgba(12,18,26,.82));
      padding: 10px;
    }
    .itemTop{
      display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
    }
    .itemTitle{
      font-weight: 1000;
      line-height: 1.15;
      font-size: 13px;
    }
    .itemMeta{
      margin-top:4px;
      display:flex; flex-wrap:wrap; gap:6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    .itemStats{
      margin-top:8px;
      display:flex; flex-wrap:wrap; gap:8px;
    }
    .statPill{
      border:1px solid rgba(38,58,85,.82);
      background: rgba(22,36,55,.65);
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 900;
      color: var(--text);
      display:inline-flex; gap:6px; align-items:center;
    }
    .statPill .k{color:var(--muted); font-weight: 950; font-size:10px;}
    .actionLine{
      margin-top:10px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .divider{height:1px; background: rgba(38,58,85,.70); margin:10px 0;}
  </style>
</head>
<body>
<header>
  <div class="topRow">
    <div class="leftHdr">
      <button class="iconBtn" data-act="drawer_open" aria-label="Menu">☰</button>
      <div class="brand">
        <div class="title">🏈 CFB Dynasty Sim <span class="pill">OFFLINE</span></div>
        <div class="sub" id="subLine">Loading…</div>
      </div>
    </div>

    <div class="topActions">
      <button class="btnAccent" data-act="advance">Advance</button>
      <button class="hideOnPhone" data-act="sim">Sim</button>
      <button class="hideOnPhone btnGood" data-act="save">Save</button>
    </div>
  </div>
</header>

<div class="toasts" id="toasts"></div>

      <div class="drawerTitle">Menu</div>
      <button class="iconBtn" data-act="drawer_close" aria-label="Close">✕</button>

    <div class="navList" id="navList"></div>
  </div>
</div>

<main id="app"></main>
<div id="overlayRoot"></div>

<script>
/* ==========================================================
   FINAL WORKING BUILD + PATCHES
   - Bottom 25 start rule
   - Weekly recruiting points reset
   - Needs targets tightened
   - Staff background recruiting (doesn't steal your points)
   - Recruits sign as FR (eligibility fixed)
   - ATH-only offseason position changes
========================================================== */

const U = {
  clamp:(v,a,b)=>Math.max(a,Math.min(b,v)),
  rint:(a,b)=>Math.floor(a + Math.random()*(b-a+1)),
  pick:(arr)=>arr[Math.floor(Math.random()*arr.length)],
  uuid:()=> (crypto?.randomUUID ? crypto.randomUUID() : ("id"+Math.random().toString(16).slice(2)+Date.now())),
  deepCopy:(o)=>JSON.parse(JSON.stringify(o)),
  safe:(s)=> (s??"").toString().replace(/[<>&"]/g, m=>({ "<":"&lt;", ">":"&gt;", "&":"&amp;", "\"":"&quot;" }[m])),
  fmt:(n)=> (n??0).toLocaleString(),
};

function toast(title, msg, type=""){
  const wrap = document.getElementById("toasts");
  const el = document.createElement("div");
  el.className = "toast " + (type||"");
  el.innerHTML = `<div class="t">${U.safe(title)}</div><div class="s">${U.safe(msg)}</div>`;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity="0"; el.style.transform="translateY(-6px)"; }, 3400);
  setTimeout(()=>{ el.remove(); }, 4100);
}

/* ---------- IndexedDB KV ---------- */
const STORE = (() => {
  const DB_NAME = "cfb_dynasty_db_final_athpos_v1";
  const STORE_NAME = "kv";
  let dbPromise = null;

  function openDB(){
    if(dbPromise) return dbPromise;
    dbPromise = new Promise((resolve)=>{
      if(!("indexedDB" in window)) return resolve(null);
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if(!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => resolve(null);
    });
    return dbPromise;
  }

  async function idbGet(key){
    const db = await openDB();
    if(!db) return null;
    return new Promise((resolve)=>{
      const tx = db.transaction(STORE_NAME, "readonly");
      const st = tx.objectStore(STORE_NAME);
      const rq = st.get(key);
      rq.onsuccess = () => resolve(rq.result ?? null);
      rq.onerror = () => resolve(null);
    });
  }

  async function idbSet(key, val){
    const db = await openDB();
    if(!db) return false;
    return new Promise((resolve)=>{
      const tx = db.transaction(STORE_NAME, "readwrite");
      const st = tx.objectStore(STORE_NAME);
      const rq = st.put(val, key);
      rq.onsuccess = () => resolve(true);
      rq.onerror = () => resolve(false);
    });
  }

  async function idbDel(key){
    const db = await openDB();
    if(!db) return false;
    return new Promise((resolve)=>{
      const tx = db.transaction(STORE_NAME, "readwrite");
      const st = tx.objectStore(STORE_NAME);
      const rq = st.delete(key);
      rq.onsuccess = () => resolve(true);
      rq.onerror = () => resolve(false);
    });
  }

  return {
    async get(key){ return await idbGet(key); },
    async set(key,val){ return await idbSet(key,val); },
    async del(key){ return await idbDel(key); },
  };
})();

/* ---------- Game Config ---------- */
const GAME = {
  SAVE_KEY: "cfb_dynasty_SAVE_final_athpos_v1",
  MAX_SCHOLARSHIPS: 85,
  CLASS_SLOTS: 25,
  REG_WEEKS: 12,
  CONF_CHAMP_WEEK: 13,
  CFP_R1_WEEK: 14,
  CFP_QF_WEEK: 15,
  CFP_SF_WEEK: 16,
  CFP_TITLE_WEEK: 17,
  OFFSEASON_WEEKS: 4,
  RECRUIT_POOL: 720,
  POS: ["QB","RB","WR","TE","OL","DL","LB","CB","S","ATH"],
  STATES: ["AL","AK","AZ","AR","CA","CO","CT","DE","FL","GA","HI","ID","IL","IN","IA","KS","KY","LA","ME","MD","MA","MI","MN","MS","MO","MT","NE","NV","NH","NJ","NM","NY","NC","ND","OH","OK","OR","PA","RI","SC","SD","TN","TX","UT","VT","VA","WA","WV","WI","WY"],
};

function weekName(w){
  if(w===0) return "Preseason";
  if(w>=1 && w<=GAME.REG_WEEKS) return `Week ${w}`;
  if(w===GAME.CONF_CHAMP_WEEK) return "Conference Championship Week";
  if(w===GAME.CFP_R1_WEEK) return "CFP First Round";
  if(w===GAME.CFP_QF_WEEK) return "CFP Quarterfinals";
  if(w===GAME.CFP_SF_WEEK) return "CFP Semifinals";
  if(w===GAME.CFP_TITLE_WEEK) return "National Championship";
  const offStart = GAME.CFP_TITLE_WEEK+1;
  if(w===offStart) return "Offseason Wk1 (Jobs)";
  if(w===offStart+1) return "Offseason Wk2";
  if(w===offStart+2) return "Offseason Wk3 (Late Recruiting)";
  if(w===offStart+3) return "Offseason Wk4 (Signing/Progression)";
  return `Week ${w}`;
}

/* ---------- Prestige Cap ---------- */
function maxStarsByPrestige(p){
  if(p < 55) return 3;
  if(p < 70) return 4;
  return 5;
}
function canRecruitByPrestige(team, r){
  if(!team || !r) return false;
  if(r.openToAll) return true;
  return r.stars <= maxStarsByPrestige(team.prestige);
}

/* ---------- Teamset (default) ---------- */
const TEAMSET = {

    {name:"Mountain West", prestigeBase:70, teams:["Air Force","Boise State","Colorado State","Fresno State","Hawai'i","Nevada","New Mexico","San Diego State","San Jose State","UNLV","Utah State","Wyoming"]},

/* ---------- Utilities ---------- */
function hash32(str){
  let h = 2166136261>>>0;
  for(let i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h>>>0;
}
function noiseRange(key, min, max){
  const h = hash32(key);
  const span = (max-min+1);
  return min + (h % span);
}
function capMap(obj, maxKeys){
  const keys = Object.keys(obj||{});
  if(keys.length<=maxKeys) return;
  keys.sort((a,b)=>Math.abs(obj[a]) - Math.abs(obj[b]));
  const drop = keys.slice(0, keys.length-maxKeys);
  for(const k of drop) delete obj[k];
}

/* ---------- Skill Tree (kept from working build) ---------- */
const ARCH = ["Recruiter","Motivator","Tactician"];
const SKILL_NODES = {
  Recruiter: [
    {key:"rec_close", name:"Closer", tier:2, max:3, desc:"+Late commit odds"},
    {key:"rec_visits", name:"Visit King", tier:2, max:3, desc:"+Visit impact"},
    {key:"rec_sway", name:"Sway Artist", tier:3, max:2, desc:"+Sway success odds"},
    {key:"rec_elite", name:"Elite Recruiter", tier:4, max:2, desc:"+4–5★ battles"},
  ],
  Motivator: [
    {key:"mot_dev", name:"Player Growth", tier:1, max:3, desc:"+Offseason development"},
    {key:"mot_master", name:"Master Motivator", tier:4, max:2, desc:"+Big dev boost"},
  ],
  Tactician: [
    {key:"tac_off", name:"Offense System", tier:1, max:3, desc:"+Sim offense"},
    {key:"tac_def", name:"Defense System", tier:1, max:3, desc:"+Sim defense"},
    {key:"tac_close", name:"Close Game Killer", tier:2, max:3, desc:"+Win tight games"},
  ],
};
function makeSkillState(){
  const out = {};
  for(const a of ARCH){
    out[a] = {};
    for(const n of (SKILL_NODES[a]||[])){
      out[a][n.key] = {lvl:0, max:n.max};
    }
  }
  return out;
}
function nodeCost(arch, key, lvl){
  const node = (SKILL_NODES[arch]||[]).find(x=>x.key===key);
  if(!node) return 1;
  const base = node.tier<=2 ? 1 : (node.tier===3 ? 2 : 3);
  return base + lvl;
}
function sumArchLevels(coach, arch){
  const s = coach.skillsTree?.[arch] || {};
  return Object.values(s).reduce((a,x)=>a+(x.lvl||0),0);
}
function addXP(coach, amt){
  coach.xp += amt;
  while(coach.xp >= 100){
    coach.xp -= 100;
    coach.skillPoints += 1;
    toast("Skill Point", "+1 skill point earned.", "good");
  }
}
function upgradeNode(coach, arch, key){
  const node = (SKILL_NODES[arch]||[]).find(x=>x.key===key);
  if(!node) return;
  const st = coach.skillsTree[arch][key];
  if(st.lvl>=st.max) return toast("Maxed","That perk is maxed.","bad");
  const cost = nodeCost(arch, key, st.lvl);
  if(coach.skillPoints < cost) return toast("No Points", `Need ${cost} points.`, "bad");
  coach.skillPoints -= cost;
  st.lvl++;
  toast("Upgraded", `${node.name} → Lv ${st.lvl}`, "good");
}

/* ---------- Players / Teams ---------- */
function blankStats(){ return { gp:0, passY:0, rushY:0, recY:0, tkl:0, sack:0, int:0 }; }
function ensureStats(p){
  if(!p.seasonStats) p.seasonStats = blankStats();
  if(!p.careerStats) p.careerStats = blankStats();
}
function addStats(dst, add){ for(const k of Object.keys(add)){ if(typeof add[k]==="number") dst[k] = (dst[k]||0) + add[k]; } }
function makePlayer({pos,year,ovr,pot}){
  return { id: U.uuid(), name: genPlayerName(), pos, year, ovr, pot, seasonStats: blankStats(), careerStats: blankStats() };
}
function teamAvgOVR(team){
  return Math.round(team.roster.reduce((a,p)=>a+p.ovr,0)/Math.max(1,team.roster.length));
}
function recomputeScholarships(team){
  const now = Math.max(0, GAME.MAX_SCHOLARSHIPS - (team.roster?.length||0));
  const seniors = (team.roster||[]).filter(p=>p.year==="SR").length;
  team.scholarshipsNow = now;
  team.scholarshipsProjected = U.clamp(now + seniors, 0, GAME.MAX_SCHOLARSHIPS);
}
function computeNeeds(team){
  const counts = {};
  for(const p of team.roster) counts[p.pos] = (counts[p.pos]||0)+1;

  // ✅ tightened realistic baseline targets (85-man)
  const target = {
    QB: 4,
    RB: 7,
    WR: 12,
    TE: 5,
    OL: 16,
    DL: 14,
    LB: 12,
    CB: 9,
    S: 6,
    ATH: 3
  };

  team.needs = {};
  for(const pos of GAME.POS) team.needs[pos] = Math.max(0, (target[pos]||0) - (counts[pos]||0));
}
function buildRoster(team){
  // build a sane 85-man roster with realistic spread
  const dist = [];
  dist.push(...Array(4).fill("QB"));
  dist.push(...Array(7).fill("RB"));
  dist.push(...Array(12).fill("WR"));
  dist.push(...Array(5).fill("TE"));
  dist.push(...Array(16).fill("OL"));
  dist.push(...Array(14).fill("DL"));
  dist.push(...Array(12).fill("LB"));
  dist.push(...Array(9).fill("CB"));
  dist.push(...Array(6).fill("S"));
  dist.push(...Array(3).fill("ATH"));
  while(dist.length<85) dist.push("WR");
  dist.length = 85;

  const years = [];
  years.push(...Array(20).fill("SR"));
  years.push(...Array(22).fill("JR"));
  years.push(...Array(22).fill("SO"));
  years.push(...Array(21).fill("FR"));

  return dist.map((pos,i)=>{
    const base = U.clamp(team.ovr + U.rint(-16,+10), 45, 93);
    const ovr = U.clamp(base + U.rint(-10,+8), 40, 95);
    const year = years[i] || U.pick(["FR","SO","JR","SR"]);
    const pot = U.rint(0,10);
    const p = makePlayer({pos,year,ovr,pot});
    ensureStats(p);
    return p;
  });
}

/* ---------- Recruiting (simple interest) ---------- */
const MOTIVES = ["brand","facilities","champ","pro","stability","playingTime"];
const ACTIONS = {
  soft: {label:"Soft", cost:40, baseEff:0.95},
  hard: {label:"Hard", cost:85, baseEff:1.45},
  sway: {label:"Sway", cost:70, baseEff:0.0},
  visit:{label:"Visit", cost:120, baseEff:1.95},
};

function makeRecruit(){
  const ovr = U.clamp(U.rint(58,92) + (Math.random()<0.06?U.rint(3,6):0), 55, 97);
  const stars = U.clamp(Math.round((ovr-55)/8), 1, 5);
  const motives = U.deepCopy(MOTIVES).sort(()=>Math.random()-0.5).slice(0,3);
  const openToAll = (stars>=4 ? (Math.random()<0.10) : (Math.random()<0.05));
  return {
    id: U.uuid(),
    name: genPlayerName(),
    pos: U.pick(GAME.POS),
    state: U.pick(GAME.STATES),
    stars, ovr, pot: U.rint(0,10),
    motives,
    openToAll,
    stage:"open",
    committedTo:null,
    offers:[],
    delta:{},
    visitedBy:{},
    visitScheduled:{},
    visitPitch:{},
    swayLocked:false,
  };
}
function buildRecruitPool(n){ return Array.from({length:n}, ()=>makeRecruit()); }

function baseInterest(r, team){
  const need = (team.needs?.[r.pos]||0);
  const needBoost = Math.min(14, need*4.2);
  const jitter = noiseRange(r.id+"|"+team.id, -12, 12);
  return U.clamp(team.prestige*0.55 + team.budget*0.22 + needBoost + jitter, 0, 100);
}
function interest(r, team){
  const offerBonus = (r.offers?.includes(team.id) ? 7 : 0);
  const d = r.delta?.[team.id] ?? 0;
  return U.clamp(baseInterest(r, team) + offerBonus + d, 0, 100);
}
function rankTeams(r){
  const arr = S.league.teams.map(t=>({id:t.id, val: interest(r, t)}));
  arr.sort((a,b)=>b.val-a.val);
  return arr;
}
function hasUserOffer(team, recruit){
  return (recruit.offers||[]).includes(team.id) || (team.recruiting.offered||[]).includes(recruit.id);
}
function ensureUserOffer(team, recruit){
  team.recruiting.offered ??= [];
  recruit.offers ??= [];
  if(!team.recruiting.offered.includes(recruit.id)) team.recruiting.offered.push(recruit.id);
  if(!recruit.offers.includes(team.id)) recruit.offers.push(team.id);
  if(recruit.offers.length>12) recruit.offers.length=12;
}
function projectedRecruitSlots(team){
  const projected = team.scholarshipsProjected ?? 0;
  const commits = team.recruiting?.commits?.length ?? 0;
  return Math.max(0, projected - commits);
}
function canOfferRecruit(team){ return projectedRecruitSlots(team) > 0; }

function offerRecruit(recruitId){
  const team = getUserTeam();
  const r = S.recruits.find(x=>x.id===recruitId);
  if(!team || !r) return;

  if(!canRecruitByPrestige(team, r)){
    const cap = maxStarsByPrestige(team.prestige);
    return toast("Prestige Cap", `Your prestige caps you at ${cap}★ unless recruit is OPEN.`, "bad");
  }
  if((team.recruiting.offered||[]).includes(recruitId)) return toast("Already Offered", "Offer already used.", "bad");
  if(!canOfferRecruit(team)) return toast("No Projected Slots", "You have 0 projected scholarships left.", "bad");

  ensureUserOffer(team, r);
  toast("Offer Sent", `${r.stars}★ ${r.pos} ${r.name}`, "good");
}

/* ---------- Visit scheduling (simple) ---------- */
function queueModal(obj){ S.ui.modalQueue.push(obj); }
function clearModal(){ S.ui.modalQueue.shift(); }

function applyRecruitAction(team, coach, r, actionKey){
  const A = ACTIONS[actionKey];
  if(!A) return;

  if(!canRecruitByPrestige(team, r)){
    const cap = maxStarsByPrestige(team.prestige);
    return toast("Prestige Cap", `Cap ${cap}★ unless OPEN.`, "bad");
  }

  const offered = hasUserOffer(team, r);
  if(actionKey!=="sway" && actionKey!=="visit" && !offered) return toast("Offer Needed","Offer first.","bad");
  if(actionKey==="visit" && !offered) return toast("Offer Needed","Offer first.","bad");

  const avail = team.recruiting.points - team.recruiting.spent;
  if(A.cost > avail) return toast("No Points", `Only ${avail} left.`, "bad");

  if(actionKey==="visit"){
    if(r.visitedBy?.[team.id]) return toast("Visited","Already completed.","bad");
    if(r.visitScheduled?.[team.id]!=null) return toast("Scheduled","Already scheduled.","bad");

    const okWeeks = [];
    if(S.phase==="season"){ for(let w=6; w<=GAME.REG_WEEKS; w++) okWeeks.push(w); }
    else { okWeeks.push(GAME.CFP_TITLE_WEEK+1+2); }

    queueModal({ type:"scheduleVisit", recruitId:r.id, cost:A.cost, weeks: okWeeks });
    return;
  }

  team.recruiting.spent += A.cost;

  if(actionKey==="sway"){
    if(r.swayLocked) return toast("Sway Locked", "Only one sway attempt.", "bad");
    r.swayLocked = true;
    const odds = U.clamp(0.35 + sumArchLevels(coach,"Recruiter")*0.06 + U.rint(-6,6)/100, 0.12, 0.85);
    if(Math.random()<odds){
      const bump = 10 + sumArchLevels(coach,"Recruiter")*2 + U.rint(0,6);
      r.delta[team.id] = (r.delta[team.id]||0) + bump;
      toast("Sway Success", `+${bump} interest`, "good");
    } else {
      const hit = 6 + U.rint(0,6);
      r.delta[team.id] = (r.delta[team.id]||0) - hit;
      toast("Sway Failed", `-${hit} interest`, "warn");
    }
    capMap(r.delta, 14);
    return;
  }

  const cur = interest(r, team);
  const closer = coach.skillsTree.Recruiter.rec_close.lvl || 0;
  const elite = coach.skillsTree.Recruiter.rec_elite.lvl || 0;
  const recLevels = sumArchLevels(coach,"Recruiter");
  const eff = (0.040 + (coach.rep.recruiting*0.00022) + (recLevels*0.010) + (elite*0.010)) * A.baseEff;

  let gain = Math.round(A.cost * eff * (1 - cur/135));
  if(actionKey==="hard") gain += Math.round(closer*2);
  gain += U.rint(-1,2);

  r.delta[team.id] = (r.delta[team.id]||0) + gain;
  capMap(r.delta, 14);
  toast(`${A.label}`, `+${gain} interest`, "good");
}

function applyScheduledVisitsForWeek(){
  const team = getUserTeam();
  if(!team) return;
  const wk = S.weekIndex;
  const offStart = GAME.CFP_TITLE_WEEK+1;
  const okWeek = (S.phase==="season" && wk>=6 && wk<=GAME.REG_WEEKS) || (S.phase==="offseason" && wk===offStart+2);
  if(!okWeek) return;

  const coach = S.userCoach;
  const visitKing = coach.skillsTree.Recruiter.rec_visits.lvl || 0;

  for(const r of S.recruits){
    if(r.stage!=="open") continue;
    const sched = r.visitScheduled?.[team.id];
    if(sched !== wk) continue;

    const cur = interest(r, team);
    const eff = (0.044 + coach.rep.recruiting*0.00022 + sumArchLevels(coach,"Recruiter")*0.010 + visitKing*0.012)
      * ACTIONS.visit.baseEff;

    const gain = Math.round(ACTIONS.visit.cost * eff * (1 - cur/135)) + U.rint(-1,2);
    r.delta[team.id] = (r.delta[team.id]||0) + gain;
    capMap(r.delta, 14);

    r.visitedBy[team.id] = true;
    delete r.visitScheduled[team.id];
    toast("Visit Completed", `${r.name} (+${gain})`, "good");
  }
}

function weeklyRecruitingPoints(team){
  const hc = team.staff?.HC;
  const a1 = team.staff?.A1, a2 = team.staff?.A2;
  const rep = ((hc?.rep?.recruiting??55) + (a1?.rep?.recruiting??55) + (a2?.rep?.recruiting??55))/3;
  return 420 + Math.round(team.budget*6.0) + Math.round(rep*2.0);
}
function buildSeasonSchedule(teams){
  const weeks = [];
  const byConf = {};
  for(const t of teams) (byConf[t.conf] ??= []).push(t);

  for(let w=1; w<=GAME.REG_WEEKS; w++){
    const games = [];
    const used = new Set();
    const order = teams.slice().sort(()=>Math.random()-0.5);

    for(const a of order){
      if(used.has(a.id)) continue;
      const same = (byConf[a.conf]||[]).filter(x=>!used.has(x.id) && x.id!==a.id);
      const any = teams.filter(x=>!used.has(x.id) && x.id!==a.id);
      const pool = (Math.random()<0.62 && same.length)? same : any;
      if(!pool.length) continue;
      const b = U.pick(pool);
      used.add(a.id); used.add(b.id);
      games.push({home:a.id, away:b.id, played:false, scoreH:0, scoreA:0, confGame: (a.conf===b.conf)});
    }
    weeks.push({week:w, games});
  }
  return weeks;
}
function tacticsBoost(team){
  const hc = team.staff?.HC;
  const off = hc?.skillsTree?.Tactician?.tac_off?.lvl||0;
  const def = hc?.skillsTree?.Tactician?.tac_def?.lvl||0;
  const close = hc?.skillsTree?.Tactician?.tac_close?.lvl||0;
  return {off, def, close};
}
function simGame(teamH, teamA){
  const hb = tacticsBoost(teamH), ab = tacticsBoost(teamA);
  const base = 24, homeAdv = 2.8;
  const hOff = teamH.off + hb.off*2 + teamAvgOVR(teamH)*0.2;
  const hDef = teamH.def + hb.def*2 + teamAvgOVR(teamH)*0.2;
  const aOff = teamA.off + ab.off*2 + teamAvgOVR(teamA)*0.2;
  const aDef = teamA.def + ab.def*2 + teamAvgOVR(teamA)*0.2;

  let expH = base + (hOff - aDef)*0.22 + homeAdv + U.rint(-9,+9);
  let expA = base + (aOff - hDef)*0.22 + U.rint(-9,+9);

  // close game perk: small nudge if within 3
  if(Math.abs(expH-expA) <= 3 && hb.close>0) expH += hb.close;
  if(Math.abs(expA-expH) <= 3 && ab.close>0) expA += ab.close;

  expH = U.clamp(Math.round(expH), 3, 62);
  expA = U.clamp(Math.round(expA), 3, 62);
  if(expH===expA){ expH += U.rint(3,10); expA += U.rint(0,9); }

  return {scoreH:expH, scoreA:expA};
}
function applyResult(teamH, teamA, scoreH, scoreA, confGame){
  teamH.season.games++; teamA.season.games++;
  teamH.season.pf += scoreH; teamH.season.pa += scoreA;
  teamA.season.pf += scoreA; teamA.season.pa += scoreH;
  if(scoreH>scoreA){
    teamH.season.w++; teamA.season.l++;
    if(confGame){ teamH.season.confW++; teamA.season.confL++; }
  } else {
    teamA.season.w++; teamH.season.l++;
    if(confGame){ teamA.season.confW++; teamH.season.confL++; }
  }
}

/* ---------- CFP simplified (kept stable) ---------- */
function teamPollScore(t){
  const g = t.season.games||0;
  const winPct = g ? (t.season.w/g) : 0;
  const margin = g ? ((t.season.pf - t.season.pa)/g) : 0;
  return (winPct*100) + (margin*2.0) + (t.prestige*0.55) + (t.ovr*0.25);
}
function computeRankings(){
  const ranked = S.league.teams.slice().sort((a,b)=>teamPollScore(b)-teamPollScore(a));
  ranked.forEach((t,i)=>t.ranking=i+1);
}
function confChampionsTop5(){
  const byConf = {};
  for(const t of S.league.teams) (byConf[t.conf] ??= []).push(t);
  const champs = [];
  for(const [conf,list] of Object.entries(byConf)){
    if(list.length<2) continue;
    const sorted = list.slice().sort((a,b)=>{
      const aPct = (a.season.confW+a.season.confL)? a.season.confW/(a.season.confW+a.season.confL) : 0;
      const bPct = (b.season.confW+b.season.confL)? b.season.confW/(b.season.confW+b.season.confL) : 0;
      if(bPct!==aPct) return bPct-aPct;
      if(b.season.w!==a.season.w) return b.season.w-a.season.w;
      return teamPollScore(b)-teamPollScore(a);
    });
    champs.push({conf, teamId: sorted[0]?.id});
  }
  return champs.map(x=>({conf:x.conf, teamId:x.teamId, score: teamPollScore(getTeam(x.teamId))}))
    .sort((a,b)=>b.score-a.score)
    .slice(0,5);
}
function buildCFPField(){
  computeRankings();
  const champs = confChampionsTop5();
  const champSet = new Set(champs.map(x=>x.teamId));
  const ranked = S.league.teams.slice().sort((a,b)=>a.ranking-b.ranking);

  const field = [];
  for(const c of champs){ field.push({teamId:c.teamId, auto:true, conf:c.conf}); }
  for(const t of ranked){
    if(field.length>=12) break;
    if(champSet.has(t.id)) continue;
    field.push({teamId:t.id, auto:false, conf:t.conf});
  }
  const seeded = field.slice().sort((a,b)=>getTeam(a.teamId).ranking - getTeam(b.teamId).ranking);
  seeded.forEach((x,i)=>x.seed=i+1);
  seeded.sort((a,b)=>a.seed-b.seed);

  const r1 = [
    {a:seeded[4], b:seeded[11]},
    {a:seeded[5], b:seeded[10]},
    {a:seeded[6], b:seeded[9]},
    {a:seeded[7], b:seeded[8]},
  ].map(m=>({a:m.a, b:m.b, res:null}));

  S.post.cfp = { field: seeded, r1, qf:[], sf:[], title:[], champ:null };

  const my = getUserTeam();
  if(my){
    const slot = seeded.find(x=>x.teamId===my.id);
    if(slot){
      queueModal({ type:"selection", title:"CFP SELECTION", teamName: my.name, line: `Seed #${slot.seed} • ${slot.auto ? "Auto-Bid" : "At-Large"}` });
    }
  }
}
function simNeutral(teamA, teamB){
  let a = 24 + (teamA.off-teamB.def)*0.22 + U.rint(-9,+9);
  let b = 24 + (teamB.off-teamA.def)*0.22 + U.rint(-9,+9);
  a = U.clamp(Math.round(a), 3, 62);
  b = U.clamp(Math.round(b), 3, 62);
  if(a===b) a += U.rint(1,6);
  return {aScore:a, bScore:b, winId: a>b ? teamA.id : teamB.id};
}
function playCFPRound(week){
  const B = S.post.cfp;
  if(!B) return;

  const my = getUserTeam();
  const coach = S.userCoach;

  if(week===GAME.CFP_R1_WEEK){
    const winners = [];
    for(const m of B.r1){
      const A = getTeam(m.a.teamId), B2 = getTeam(m.b.teamId);
      const res = simNeutral(A,B2);
      m.res = res; winners.push(res.winId);
      if(my && res.winId===my.id){ coach.career.playoffWins++; addXP(coach, 40); }
    }
    const seed = (n)=>B.field[n-1].teamId;
    const w5_12=B.r1[0].res.winId, w6_11=B.r1[1].res.winId, w7_10=B.r1[2].res.winId, w8_9=B.r1[3].res.winId;
    B.qf = [
      {a:{teamId:seed(1)}, b:{teamId:w8_9}, res:null},
      {a:{teamId:seed(4)}, b:{teamId:w5_12}, res:null},
      {a:{teamId:seed(2)}, b:{teamId:w7_10}, res:null},
      {a:{teamId:seed(3)}, b:{teamId:w6_11}, res:null},
    ];
    return;
  }
  if(week===GAME.CFP_QF_WEEK){
    const winners=[];
    for(const m of B.qf){
      const A=getTeam(m.a.teamId), B2=getTeam(m.b.teamId);
      const res=simNeutral(A,B2); m.res=res; winners.push(res.winId);
      if(my && res.winId===my.id){ coach.career.playoffWins++; addXP(coach, 55); }
    }
    B.sf = [
      {a:{teamId:winners[0]}, b:{teamId:winners[1]}, res:null},
      {a:{teamId:winners[2]}, b:{teamId:winners[3]}, res:null},
    ];
    return;
  }
  if(week===GAME.CFP_SF_WEEK){
    const winners=[];
    for(const m of B.sf){
      const A=getTeam(m.a.teamId), B2=getTeam(m.b.teamId);
      const res=simNeutral(A,B2); m.res=res; winners.push(res.winId);
      if(my && res.winId===my.id){ coach.career.playoffWins++; addXP(coach, 70); }
    }
    B.title = [{a:{teamId:winners[0]}, b:{teamId:winners[1]}, res:null}];
    return;
  }
  if(week===GAME.CFP_TITLE_WEEK){
    const m=B.title[0];
    const A=getTeam(m.a.teamId), B2=getTeam(m.b.teamId);
    const res=simNeutral(A,B2); m.res=res; B.champ=res.winId;
    if(my && res.winId===my.id){
      coach.career.natties += 1;
      addXP(coach, 200);
      toast("CHAMPIONS!", `${my.name} won the Natty!`, "good");
    } else toast("Champion", `${getTeam(res.winId).name} won it all.`, "warn");
    return;
  }
}
function advanceCFPWeeks(){
  if(S.weekIndex===GAME.CFP_R1_WEEK){
    if(!S.post.cfpBuilt){
      buildCFPField();
      S.post.cfpBuilt = true;
      if(S.ui.modalQueue.length) return;
    }
    playCFPRound(GAME.CFP_R1_WEEK);
    return;
  }
  playCFPRound(S.weekIndex);
}
function simConferenceChampWeek(){
  // simple: give prestige bump to best conf team by conf record
  computeRankings();
  const byConf = {};
  for(const t of S.league.teams) (byConf[t.conf] ??= []).push(t);
  for(const [conf,list] of Object.entries(byConf)){
    if(list.length<2) continue;
    const sorted = list.slice().sort((a,b)=>{
      const aPct=(a.season.confW+a.season.confL)? a.season.confW/(a.season.confW+a.season.confL):0;
      const bPct=(b.season.confW+b.season.confL)? b.season.confW/(b.season.confW+b.season.confL):0;
      if(bPct!==aPct) return bPct-aPct;
      if(b.season.w!==a.season.w) return b.season.w-a.season.w;
      return teamPollScore(b)-teamPollScore(a);
    });
    if(sorted[0]) sorted[0].prestige = U.clamp(sorted[0].prestige+1, 35, 99);
  }
  toast("Conference Champs", "Championship week complete.", "good");
}

/* ---------- Staff background recruiting (user team) ---------- */
function staffRecruitingForUserTeam(){
  const team = getUserTeam();
  if(!team) return;
  const staffBudget = Math.round(weeklyRecruitingPoints(team) * 0.78);
  let spent = 0;

  const open = S.recruits.filter(r=>r.stage==="open");
  const cap = maxStarsByPrestige(team.prestige);

  const candidates = open
    .filter(r => r.openToAll || r.stars <= cap)
    .sort(()=>Math.random()-0.5)
    .slice(0, 160)
    .sort((a,b)=>{
      const na=(team.needs?.[a.pos]||0), nb=(team.needs?.[b.pos]||0);
      if(nb!==na) return nb-na;
      if(b.stars!==a.stars) return b.stars-a.stars;
      return b.ovr-a.ovr;
    })
    .slice(0, 18);

  for(const r of candidates){
    const avail = staffBudget - spent;
    if(avail<=0) break;

    // staff offers (does NOT add to your offered/target board)
    if(!r.offers.includes(team.id) && Math.random()<0.55){
      r.offers.push(team.id);
      if(r.offers.length>12) r.offers.length=12;
    }

    const spend = Math.min(avail, U.rint(60,160));
    spent += spend;

    const cur = interest(r, team);
    const rep = ((team.staff.HC.rep.recruiting) + (team.staff.A1.rep.recruiting) + (team.staff.A2.rep.recruiting))/3;
    const eff = 0.040 + rep*0.00022 + (sumArchLevels(team.staff.HC,"Recruiter")*0.008);
    const gain = Math.round(spend * eff * (1 - cur/140)) + U.rint(-2,3);

    r.delta[team.id] = (r.delta[team.id]||0) + gain;
    capMap(r.delta, 14);
  }
}

/* ---------- Weekly budgets reset ---------- */
function refreshWeeklyRecruitingBudgets(){
  for(const t of S.league.teams){
    t.recruiting.points = weeklyRecruitingPoints(t);
    t.recruiting.spent = 0;
    t.recruiting.spentMap = {}; // weekly view
  }
}

/* ---------- AI recruiting week (does NOT spend your user points) ---------- */
function aiRecruitingWeek(){
  const open = S.recruits.filter(r=>r.stage==="open");

  for(const t of S.league.teams){
    // always refresh team state
    recomputeScholarships(t);
    computeNeeds(t);

    // budgets are already set by refreshWeeklyRecruitingBudgets()
    // do not let AI spend user team's points
    if(t.id===S.userTeamId) continue;

    const cap = maxStarsByPrestige(t.prestige);

    const targets = open
      .filter(r => r.openToAll || r.stars <= cap)
      .slice().sort(()=>Math.random()-0.5).slice(0, 140)
      .sort((a,b)=>{
        const na=(t.needs?.[a.pos]||0), nb=(t.needs?.[b.pos]||0);
        if(nb!==na) return nb-na;
        if(b.stars!==a.stars) return b.stars-a.stars;
        return b.ovr-a.ovr;
      }).slice(0,14);

    for(const r of targets){
      if(!r.offers.includes(t.id) && Math.random()<0.52){
        r.offers.push(t.id);
        if(r.offers.length>12) r.offers.length=12;
      }
      const avail = t.recruiting.points - t.recruiting.spent;
      if(avail<=0) break;

      const spend = Math.min(avail, Math.random()<0.45 ? U.rint(90,180) : U.rint(50,140));
      t.recruiting.spent += spend;

      const cur = interest(r, t);
      const rep = (t.staff.HC.rep.recruiting);
      const eff = (0.040 + rep*0.00022) * (Math.random()<0.45?1.28:0.92);
      const gain = Math.round(spend * eff * (1 - cur/140)) + U.rint(-2,3);

      r.delta[t.id] = (r.delta[t.id]||0) + gain;
      capMap(r.delta, 14);
    }
  }

  // ✅ staff recruiting for your team happens AFTER AI
  staffRecruitingForUserTeam();

  // visits resolve
  applyScheduledVisitsForWeek();
}

/* ---------- Commitments ---------- */
function resolveCommitments(){
  for(const r of S.recruits){
    if(r.stage!=="open") continue;
    const ranked = rankTeams(r);
    const leaderId = ranked[0].id;
    const leaderTeam = getTeam(leaderId);
    const leaderVal = ranked[0].val;
    if(!leaderTeam) continue;

    if(!canRecruitByPrestige(leaderTeam, r)) continue;
    const hasOffer = r.offers.includes(leaderId);
    const room = (leaderTeam.recruiting.commits.length < leaderTeam.recruiting.classSlots);
    if(!hasOffer || !room) continue;

    let p=0;
    if(S.phase==="season"){
      const wk = S.weekIndex;
      const late = wk>=9;
      if(leaderVal>=72) p = 0.07 + (leaderVal-70)*0.006;
      if(late && leaderVal>=66) p = 0.15 + (leaderVal-66)*0.007;
    } else if(S.phase==="offseason"){
      const offStart = GAME.CFP_TITLE_WEEK+1;
      if(S.weekIndex===offStart+2 && leaderVal>=60) p = 0.22 + (leaderVal-60)*0.007;
    }

    // user closer perk boosts commit chance when you lead
    if(leaderId===S.userTeamId){
      const closer = S.userCoach.skillsTree.Recruiter.rec_close.lvl || 0;
      p *= (1 + closer*0.10);
    }

    if(Math.random()<U.clamp(p,0,0.65)){
      r.stage="committed";
      r.committedTo = leaderId;
      leaderTeam.recruiting.commits.push(r.id);

      if(leaderId===S.userTeamId){
        toast("Commitment!", `${r.stars}★ ${r.pos} ${r.name}`, "good");
        queueModal({ type:"commit", title:"COMMITMENT!", teamName: getUserTeam().name, recruit:{...r} });
      } else {
        // if you were in top 3, show loss toast
        const myRank = ranked.findIndex(x=>x.id===S.userTeamId)+1;
        if(myRank>0 && myRank<=3 && interest(r, getUserTeam())>=60){
          toast("Lost Recruit", `${r.name} → ${leaderTeam.name}`, "bad");
        }
      }
    }
  }
}

/* ---------- Eligibility FIX + Signing + Progression ---------- */
function signAndProgress(){
  // build signed list first
  const signedByTeam = new Map(); // teamId -> recruits
  for(const r of S.recruits){
    if(r.stage==="committed" && r.committedTo){
      r.stage="signed";
      if(!signedByTeam.has(r.committedTo)) signedByTeam.set(r.committedTo, []);
      signedByTeam.get(r.committedTo).push(r);
    }
  }

  for(const t of S.league.teams){
    // graduate seniors first
    t.roster = (t.roster||[]).filter(p=>p.year!=="SR");

    // advance returning players
    for(const p of t.roster){
      if(p.year==="FR") p.year="SO";
      else if(p.year==="SO") p.year="JR";
      else if(p.year==="JR") p.year="SR";
      ensureStats(p);
      p.seasonStats = blankStats();
    }

    // offseason growth
    const hc = t.staff.HC;
    const devBase = 1 + U.rint(0,2);
    const devPerk = (hc.skillsTree.Motivator.mot_dev.lvl||0)*0.8 + (hc.skillsTree.Motivator.mot_master.lvl||0)*1.2;
    for(const p of t.roster){
      const grow = devBase + Math.round(devPerk*0.6) + U.rint(0,1);
      p.ovr = U.clamp(p.ovr + grow, 35, 99);
    }

    // ✅ add signed recruits AFTER year advance so they remain FR
    const signed = signedByTeam.get(t.id) || [];
    for(const r of signed){
      const np = makePlayer({
        pos: r.pos,
        year: "FR",
        ovr: U.clamp(r.ovr + U.rint(-3,+3), 40, 95),
        pot: r.pot
      });
      np.name = r.name;
      ensureStats(np);
      t.roster.push(np);
    }

    // cap roster
    if(t.roster.length > GAME.MAX_SCHOLARSHIPS){
      t.roster.sort((a,b)=>b.ovr-a.ovr);
      t.roster = t.roster.slice(0, GAME.MAX_SCHOLARSHIPS);
    }

    recomputeScholarships(t);
    computeNeeds(t);

    // reset recruiting class
    t.recruiting.offered=[];
    t.recruiting.spentMap={};
    t.recruiting.commits=[];
    t.recruiting.classSlots=GAME.CLASS_SLOTS;
    t.recruiting.spent=0;
  }
}

/* ---------- ATH-only reposition ---------- */
function canRepositionNow(){
  const offStart = GAME.CFP_TITLE_WEEK + 1;
  const inOffseason = (S.phase==="offseason" && S.weekIndex>=offStart && S.weekIndex<=offStart+3);
  const inPreseason = (S.phase==="season" && S.weekIndex===0);
  return inOffseason || inPreseason;
}
function repositionPenalty(oldPos, newPos){
  if(oldPos===newPos) return 0;
  // ATH is flexible; small penalty
  return U.rint(0,2);
}

/* ---------- Sim Week Games ---------- */
function simWeekGames(){
  const sched = S.league.schedule[S.weekIndex-1];
  if(!sched) return;

  const my = getUserTeam();

  for(const g of sched.games){
    if(g.played) continue;
    const h = getTeam(g.home), a = getTeam(g.away);
    const res = simGame(h,a);
    g.played=true; g.scoreH=res.scoreH; g.scoreA=res.scoreA;
    applyResult(h,a,res.scoreH,res.scoreA,g.confGame);

    if(my && (h.id===my.id || a.id===my.id)){
      const winnerId = (res.scoreH>res.scoreA) ? h.id : a.id;
      const oppId = (h.id===my.id) ? a.id : h.id;
      const line = `${my.name} ${(h.id===my.id)?res.scoreH:res.scoreA}-${(h.id===my.id)?res.scoreA:res.scoreH} ${getTeam(oppId).name}`;
      if(winnerId===my.id){ S.userCoach.career.wins++; addXP(S.userCoach, 22); toast("Win", line, "good"); }
      else { S.userCoach.career.losses++; addXP(S.userCoach, 12); toast("Loss", line, "bad"); }
    }
  }
}

/* ---------- Advance Engine ---------- */
function advance(){
  if(!S) return;
  if(S.ui.modalQueue.length) return;

  if(S.phase==="setup") return toast("Setup", "Create coach and pick a team.", "warn");

  const offStart = GAME.CFP_TITLE_WEEK+1;

  if(S.phase==="season" && S.weekIndex===0){
    resetForNewSeason();
    S.weekIndex = 1;
    toast("Season Start", `Year ${S.year} begins. Week 1 budgets loaded.`, "good");
    return;
  }

  if(S.phase==="season" && S.weekIndex>=1 && S.weekIndex<=GAME.REG_WEEKS){
    aiRecruitingWeek();
    simWeekGames();
    resolveCommitments();

    // advance to next week
    S.weekIndex += 1;

    // ✅ weekly budgets regenerate at the START of the next week
    if(S.weekIndex>=1 && S.weekIndex<=GAME.REG_WEEKS){
      refreshWeeklyRecruitingBudgets();
      toast("New Week Budgets", `Recruiting points reset for ${weekName(S.weekIndex)}.`, "good");
    }

    if(S.weekIndex===GAME.CONF_CHAMP_WEEK) toast("Next", "Conference Championships", "good");
    return;
  }

  if(S.phase==="season" && S.weekIndex===GAME.CONF_CHAMP_WEEK){
    simConferenceChampWeek();
    S.weekIndex = GAME.CFP_R1_WEEK;
    return;
  }

  if(S.phase==="season" && S.weekIndex>=GAME.CFP_R1_WEEK && S.weekIndex<=GAME.CFP_TITLE_WEEK){
    advanceCFPWeeks();
    if(S.ui.modalQueue.length) return;

    S.weekIndex += 1;
    if(S.weekIndex===offStart){
      S.phase="offseason";
      toast("Offseason", "ATH position changes available now.", "good");
    }
    return;
  }

  if(S.phase==="offseason"){
    if(S.weekIndex===offStart){
      S.weekIndex = offStart+1;
      return toast("Offseason Week 2", "Roster management.", "good");
    }
    if(S.weekIndex===offStart+1){
      S.weekIndex = offStart+2;
      refreshWeeklyRecruitingBudgets(); // allow late recruiting points
      return toast("Offseason Week 3", "Late recruiting points loaded.", "good");
    }
    if(S.weekIndex===offStart+2){
      aiRecruitingWeek();
      resolveCommitments();
      S.weekIndex = offStart+3;
      return toast("Offseason Week 4", "Signing + progression next.", "good");
    }
    if(S.weekIndex===offStart+3){
      signAndProgress();
      S.year += 1;
      S.phase = "season";
      S.weekIndex = 0;
      toast("New Year", `Welcome to ${S.year}.`, "good");
      return;
    }
  }
}

}

/* ---------- Views ---------- */
function renderHome(){
  if(!S.userCoach || !S.userTeamId){
    return `
      <div class="grid">
        <div class="card">
          <h2>Create Coach</h2>
          <label>Coach Name</label>
          <input id="coach_name" placeholder="Your coach name"/>
          <div class="sep"></div>
          <button class="btnAccent" data-act="create_coach">Create Coach</button>
        </div>

        <div class="card">
          <h2>Pick Team</h2>
          <div class="muted">Career start rule: Bottom 25 prestige teams only.</div>
          <div class="sep"></div>
          <button class="btnGood" data-act="team_picker">Select Team</button>
        </div>
      </div>
    `;
  }

  const t = getUserTeam();
  recomputeScholarships(t); computeNeeds(t);
  const cap = maxStarsByPrestige(t.prestige);
  const remain = t.recruiting.points - t.recruiting.spent;

  return `
    <div class="grid">
      <div class="card">
        <div class="rowBetween">
          <h2>${U.safe(t.name)} Hub</h2>
          <span class="badge bAcc">${U.safe(weekName(S.weekIndex))}</span>
        </div>
        <div class="sep"></div>
        <div class="row">
          <span class="chip"><span class="k">REC</span>${t.season.w}-${t.season.l}</span>
          <span class="chip"><span class="k">PREST</span>${t.prestige}</span>
          <span class="chip"><span class="k">CAP</span>${cap}★</span>
          <span class="chip"><span class="k">PTS</span>${remain}/${t.recruiting.points}</span>
        </div>
        <div class="sep"></div>
        <div class="row">
          <button class="btnAccent" data-act="advance">Advance</button>
          <button data-act="sim">Sim</button>
        </div>
        <div class="hint">Assistants recruit in the background weekly so you aren't doing 20 guys solo.</div>
      </div>

      <div class="card">
        <h2>Coach</h2>
        <div class="sep"></div>
        <div class="row">
          <span class="chip"><span class="k">NAME</span>${U.safe(S.userCoach.name)}</span>
          <span class="chip"><span class="k">SP</span>${S.userCoach.skillPoints}</span>
          <span class="chip"><span class="k">XP</span>${S.userCoach.xp}/100</span>
        </div>
      </div>
    </div>
  `;
}

function renderCoach(){
  const c = S.userCoach;
  const t = getUserTeam();
  if(!c || !t) return `<div class="card"><h2>Coach</h2><div class="muted">Finish setup first.</div></div>`;

  const xpPct = Math.round((c.xp/100)*100);
  const xpBar = `<div class="progress"><div class="bar" style="width:${xpPct}%;"></div></div>`;

  const blocks = ARCH.map(arch=>{
    const nodes = (SKILL_NODES[arch]||[]).map(n=>{
      const st = c.skillsTree[arch][n.key];
      const cost = nodeCost(arch, n.key, st.lvl);
      const dis = (st.lvl>=st.max || c.skillPoints<cost) ? "disabled" : "";
      return `
        <div class="itemCard">
          <div class="itemTop">
            <div>
              <div class="itemTitle">${U.safe(n.name)} <span class="badge bAcc2">Tier ${n.tier}</span></div>
              <div class="itemMeta">${U.safe(n.desc)} • Lv ${st.lvl}/${st.max}</div>
            </div>
            <button class="btnAccent" data-act="perk" data-arch="${U.safe(arch)}" data-key="${U.safe(n.key)}" ${dis}>Cost ${cost}</button>
          </div>
        </div>
      `;
    }).join("");
    return `<div class="sep"></div><h2>${U.safe(arch)} <span class="badge bAcc2">Levels ${sumArchLevels(c,arch)}</span></h2><div class="list">${nodes}</div>`;
  }).join("");

  return `
    <div class="grid">
      <div class="card">
        <h2>${U.safe(c.name)}</h2>
        <div class="row">
          <span class="chip"><span class="k">TEAM</span>${U.safe(t.name)}</span>
          <span class="chip"><span class="k">SP</span>${c.skillPoints}</span>
        </div>
        <div class="sep"></div>
        <div class="muted">XP</div>
        ${xpBar}
        <div class="muted mini">${c.xp}/100</div>
      </div>
      <div class="card">
        <h2>Skill Tree</h2>
        <div class="muted mini">Escalating perk costs by tier and level.</div>
        ${blocks}
      </div>
    </div>
  `;
}

function renderRecruiting(){
  const t = getUserTeam();
  const c = S.userCoach;
  if(!t || !c) return `<div class="card"><h2>Recruiting</h2><div class="muted">Finish setup first.</div></div>`;

  const hsOpen = (S.phase==="season" && S.weekIndex>=1 && S.weekIndex<=GAME.REG_WEEKS);
  const offStart = GAME.CFP_TITLE_WEEK+1;
  const lateOpen = (S.phase==="offseason" && S.weekIndex===offStart+2);
  if(!hsOpen && !lateOpen) return `<div class="card"><h2>Recruiting</h2><div class="muted">Recruiting runs Weeks 1–12 + Offseason Wk3.</div></div>`;

  recomputeScholarships(t); computeNeeds(t);
  const cap = maxStarsByPrestige(t.prestige);
  const remain = t.recruiting.points - t.recruiting.spent;

  const f = S.ui.recruitFilters;
  let list = S.recruits.filter(r=>r.stage==="open");

  if(S.settings.hideLockedRecruits){
    list = list.filter(r=>canRecruitByPrestige(t, r));
  }
  if(f.pos) list = list.filter(r=>r.pos===f.pos);
  if(f.state) list = list.filter(r=>r.state===f.state);
  if(f.stars) list = list.filter(r=>r.stars>=parseInt(f.stars,10));

  if(f.sort==="ovr") list.sort((a,b)=>b.ovr-a.ovr);
  else if(f.sort==="stars") list.sort((a,b)=>b.stars-a.stars || b.ovr-a.ovr);
  else {
    list.sort((a,b)=>{
      const ra = rankTeams(a).findIndex(x=>x.id===t.id)+1;
      const rb = rankTeams(b).findIndex(x=>x.id===t.id)+1;
      return ra-rb;
    });
  }

  list = list.slice(0, 90);

  return `
    <div class="card">
      <div class="rowBetween">
        <h2>Recruiting Board</h2>
        <span class="badge bAcc">Cap ${cap}★ • Pts ${remain}/${t.recruiting.points}</span>
      </div>

      <div class="sep"></div>
      <div class="twoCol">
        <div>
          <label>Position</label>
          <select id="rf_pos">
            <option value="">All</option>
            ${GAME.POS.map(p=>`<option value="${p}" ${f.pos===p?"selected":""}>${p}</option>`).join("")}
          </select>
        </div>
        <div>
          <label>State</label>
          <select id="rf_state">
            <option value="">All</option>
            ${GAME.STATES.map(s=>`<option value="${s}" ${f.state===s?"selected":""}>${s}</option>`).join("")}
          </select>
        </div>
        <div>
          <label>Min Stars</label>
          <select id="rf_stars">
            <option value="">Any</option>
            ${[1,2,3,4,5].map(x=>`<option value="${x}" ${f.stars==x?"selected":""}>${x}★+</option>`).join("")}
          </select>
        </div>
        <div>
          <label>Sort</label>
          <select id="rf_sort">
            <option value="rank" ${f.sort==="rank"?"selected":""}>Your Rank</option>
            <option value="ovr" ${f.sort==="ovr"?"selected":""}>OVR</option>
            <option value="stars" ${f.sort==="stars"?"selected":""}>Stars</option>
          </select>
        </div>
      </div>

      <div class="row" style="margin-top:10px">
        <button class="btnAccent" data-act="rf_apply">Apply</button>
        <button data-act="rf_clear">Clear</button>
      </div>

      <div class="sep"></div>
      <div class="list">
        ${list.map(r=>{
          const locked = !canRecruitByPrestige(t, r);
          const offered = hasUserOffer(t, r);
          const myInt = interest(r, t);
          const ranked = rankTeams(r);
          const myRank = ranked.findIndex(x=>x.id===t.id)+1;
          const leader = getTeam(ranked[0].id)?.name || "—";

          const canVisit = offered && !locked && remain>=ACTIONS.visit.cost && !r.visitedBy?.[t.id] && r.visitScheduled?.[t.id]==null;
          const visitLabel = r.visitedBy?.[t.id] ? "Visited" : (r.visitScheduled?.[t.id]!=null ? `Scheduled` : "Visit");

          return `
            <div class="itemCard" style="${locked && !r.openToAll ? 'opacity:.78;' : ''}">
              <div class="itemTop">
                <div>
                  <div class="itemTitle">
                    ${"★".repeat(r.stars)}
                    ${r.openToAll?`<span class="badge bGood">OPEN</span>`:""}
                    <span class="badge bAcc">OVR ${r.ovr}</span>
                    ${U.safe(r.name)}
                  </div>
                  <div class="itemMeta">
                    ${r.pos} • ${r.state} • Your Rank #${myRank} • Leader: ${U.safe(leader)}
                  </div>
                  ${locked && !r.openToAll ? `<div class="itemMeta"><span class="badge bBad">LOCKED (Cap ${cap}★)</span></div>` : ``}
                </div>
              </div>

              <div style="margin-top:8px">
                <div class="progress"><div class="bar" style="width:${myInt}%;"></div></div>
                <div class="itemMeta">Interest: ${myInt}/100</div>
              </div>

              <div class="actionLine">
                <button data-act="offer" data-id="${r.id}" ${offered || locked || !canOfferRecruit(t) ? "disabled":""}>${offered?"Offered":"Offer"}</button>
                <button class="btnAccent" data-act="sell" data-id="${r.id}" data-kind="soft" ${locked||remain<ACTIONS.soft.cost?"disabled":""}>Soft</button>
                <button class="btnWarn" data-act="sell" data-id="${r.id}" data-kind="hard" ${locked||remain<ACTIONS.hard.cost?"disabled":""}>Hard</button>
                <button data-act="sell" data-id="${r.id}" data-kind="sway" ${locked||remain<ACTIONS.sway.cost?"disabled":""}>Sway</button>
                <button class="btnGood" data-act="sell" data-id="${r.id}" data-kind="visit" ${canVisit?"":"disabled"}>${visitLabel}</button>
              </div>
            </div>
          `;
        }).join("")}
      </div>
    </div>
  `;
}

function renderRoster(){
  const t = getUserTeam();
  if(!t) return `<div class="card"><h2>Roster</h2><div class="muted">Pick a team first.</div></div>`;
  recomputeScholarships(t);
  computeNeeds(t);

  const pos = S.ui.rosterPos || "";
  let rows = t.roster.slice();
  if(pos) rows = rows.filter(p=>p.pos===pos);
  rows.sort((a,b)=>a.pos.localeCompare(b.pos)||b.ovr-a.ovr);

  return `
    <div class="card">
      <div class="rowBetween">
        <h2>${U.safe(t.name)} Roster</h2>
        <span class="badge bAcc">Roster ${t.roster.length}/85</span>
      </div>

      <div class="sep"></div>
      <div class="twoCol">
        <div>
          <label>View by Position</label>
          <select id="rv_pos">
            <option value="">All Positions</option>
            ${GAME.POS.map(p=>`<option value="${p}" ${pos===p?"selected":""}>${p}</option>`).join("")}
          </select>
          <div class="row" style="margin-top:10px">
            <button class="btnAccent" data-act="rv_apply">Apply</button>
            <button data-act="rv_clear">Clear</button>
          </div>
        </div>
        <div>
          <label>Team Needs</label>
          <div style="margin-top:8px; display:flex; flex-wrap:wrap; gap:8px;">
            ${GAME.POS.map(p=>{
              const n = t.needs[p]||0;
              const cls = n>=4 ? "bBad" : (n>=2 ? "bWarn" : "bGood");
              return `<span class="badge ${cls}">${p}: ${n}</span>`;
            }).join(" ")}
          </div>
        </div>
      </div>

      <div class="sep"></div>
      <div class="list">
        ${rows.slice(0,220).map(p=>{
          ensureStats(p);
          return `
            <div class="itemCard">
              <div class="itemTop">
                <div>
                  <div class="itemTitle"><span class="badge bAcc2">${p.pos}</span> <span class="badge bAcc">OVR ${p.ovr}</span> ${U.safe(p.name)}</div>
                  <div class="itemMeta">${p.year}</div>
                </div>
              </div>

              ${canRepositionNow() && p.pos==="ATH" ? `
                <div class="actionLine">
                  <select data-possel="${p.id}" style="flex:1; min-width:160px;">
                    ${GAME.POS.filter(pp=>pp!=="ATH").map(pp=>`<option value="${pp}">${pp}</option>`).join("")}
                  </select>
                  <button class="btnAccent" data-act="reposition" data-id="${p.id}">Reposition ATH</button>
                </div>
                <div class="hint">ATH-only. Offseason/Preseason only. Small OVR penalty.</div>
              ` : ``}
            </div>
          `;
        }).join("")}
      </div>
    </div>
  `;
}

function renderSchedule(){
  const t = getUserTeam();
  if(!t) return `<div class="card"><h2>Schedule</h2><div class="muted">Pick a team first.</div></div>`;
  const items=[];
  for(let w=1; w<=GAME.REG_WEEKS; w++){
    const sched = S.league.schedule[w-1];
    const g = (sched?.games||[]).find(x=>x.home===t.id || x.away===t.id);
    if(!g){ items.push({w, opp:"BYE", res:"—"}); continue; }
    const home=getTeam(g.home), away=getTeam(g.away);
    const opp = (g.home===t.id) ? `${away.name} (H)` : `${home.name} (A)`;
    const res = g.played ? ((g.home===t.id)? `${g.scoreH}-${g.scoreA}` : `${g.scoreA}-${g.scoreH}`) : "—";
    items.push({w, opp, res});
  }
  return `
    <div class="card">
      <h2>${U.safe(t.name)} Schedule</h2>
      <div class="sep"></div>
      <div class="list">
        ${items.map(x=>`
          <div class="itemCard">
            <div class="itemTop">
              <div class="itemTitle">Week ${x.w}</div>
              <span class="badge bAcc2">${U.safe(x.res)}</span>
            </div>
            <div class="itemMeta">${U.safe(x.opp)}</div>
          </div>
        `).join("")}
        <div class="itemCard">
          <div class="itemTitle">Postseason</div>
          <div class="itemMeta">Week 13: Conf Champs • Week 14: CFP R1 • Week 15: QF • Week 16: SF • Week 17: Title</div>
        </div>
      </div>
    </div>
  `;
}

function renderSettings(){
  const hide = !!S.settings?.hideLockedRecruits;
  return `
    <div class="card">
      <h2>Settings</h2>
      <div class="sep"></div>
      <label>Hide Recruits Locked by Prestige Cap</label>
      <select id="set_hide">
        <option value="0" ${!hide?"selected":""}>Off (Show locked)</option>
        <option value="1" ${hide?"selected":""}>On (Hide locked)</option>
      </select>
      <div class="sep"></div>
      <button class="btnAccent" data-act="save_settings">Save Settings</button>
    </div>
  `;
}

/* ---------- Team Picker (Bottom 25 start rule) ---------- */
function openTeamPicker(){
  const all = S.league.teams.slice().sort((a,b)=>a.prestige-b.prestige);
  const startOnly = !(S.flags && S.flags.startedCareer);
  const teams = startOnly ? all.slice(0, 25) : all;

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Pick Your Team</h2>
      <div class="muted">${startOnly ? "Career start rule: Bottom 25 prestige teams only." : "Pick any team."}</div>
      <div class="sep"></div>
      <div class="list">
        ${teams.map(t=>`
          <div class="itemCard">
            <div class="itemTop">
              <div>
                <div class="itemTitle">${U.safe(t.name)}</div>
                <div class="itemMeta">${U.safe(t.conf)} • Prest ${t.prestige} • OVR ${t.ovr}</div>
              </div>
              <button class="btnGood" data-act="select_team" data-team="${t.id}">Select</button>
            </div>
          </div>
        `).join("")}
      </div>
      <div class="sep"></div>
      <button data-act="close_picker">Back</button>
    </div>
  `;
}

/* ---------- Render ---------- */
function render(){
  updateSubline();
  renderDrawerNav();
  const app = document.getElementById("app");

  if(!S){
    app.innerHTML = `
      <div class="card">
        <h2>Welcome</h2>
        <div class="muted">No save found. Start a new dynasty.</div>
        <div class="sep"></div>
        <button class="btnAccent" data-act="new_game">New Game</button>
        <button data-act="load">Load Save</button>
      </div>
    `;
    renderOverlay();
    return;
  }

  const view = ({
    home: renderHome,
    coach: renderCoach,
    recruit: renderRecruiting,
    schedule: renderSchedule,
    roster: renderRoster,
    settings: renderSettings,
  }[activeTab] || renderHome)();

  app.innerHTML = view;
  renderOverlay();
}

/* ---------- Actions ---------- */
async function save(){ if(S){ const ok = await STORE.set(GAME.SAVE_KEY, S); if(!ok) toast("Storage Full","Could not save.","bad"); } updateSubline(); }
async function loadSave(){ return await STORE.get(GAME.SAVE_KEY); }
async function hardReset(){ await STORE.del(GAME.SAVE_KEY); S=null; }

async function handle(act, el){
  try{
    if(act==="drawer_open"){ drawerOpen(); return; }
    if(act==="drawer_close"){ drawerClose(); return; }

    if(act==="new_game"){ newGame(); await save(); toast("New Game","Dynasty created.","good"); render(); return; }
    if(act==="load"){
      const v=await loadSave();
      if(!v){toast("No Save","No save found.","bad");return;}
      S=v;
      // backfill
      S.flags ??= { startedCareer:false };
      S.settings ??= { hideLockedRecruits:false };
      S.ui ??= { modalQueue:[], rosterPos:"", recruitFilters:{pos:"",state:"",stars:"",sort:"rank"} };
      S.ui.modalQueue ??= [];
      toast("Loaded","Save loaded.","good");
      render(); return;
    }

    if(act==="save"){ await save(); toast("Saved","Saved.","good"); render(); return; }
    if(act==="hard_reset"){ await hardReset(); toast("Reset","Save deleted.","warn"); render(); return; }

    if(act==="tab"){ activeTab = el.dataset.tab; drawerClose(); render(); return; }

    if(act==="modal_ack"){ clearModal(); await save(); render(); return; }

    if(act==="create_coach"){
      const name = (document.getElementById("coach_name")?.value||"").trim() || ("Coach " + U.pick(NAME.coachLast));
      S.userCoach = makeCoach({name});
      toast("Coach Created", `${S.userCoach.name} (HC)`, "good");
      await save(); render(); return;
    }

    if(act==="team_picker"){
      if(!S.userCoach) return toast("Coach Required","Create coach first.","bad");
      openTeamPicker();
      return;
    }
    if(act==="close_picker"){ render(); return; }

    if(act==="select_team"){
      if(!S.userCoach) return toast("Coach Required","Create coach first.","bad");
      const team = getTeam(el.dataset.team);

      // enforce bottom 25 start rule (first career only)
      const startOnly = !(S.flags && S.flags.startedCareer);
      if(startOnly){
        const bottom25 = S.league.teams.slice().sort((a,b)=>a.prestige-b.prestige).slice(0,25);
        const ok = bottom25.some(x=>x.id===team.id);
        if(!ok) return toast("Bottom 25 Rule","You must start with a Bottom 25 prestige team.","bad");
      }

      S.userTeamId = team.id;
      placeUserCoachOnTeam(team, S.userCoach);
      S.phase = "season";
      S.weekIndex = 0;

      // mark career started
      S.flags.startedCareer = true;

      resetForNewSeason();
      toast("Team Selected", `${team.name} • HC`, "good");
      await save(); render(); return;
    }

    if(act==="advance" || act==="sim"){ advance(); await save(); render(); return; }

    if(act==="perk"){
      upgradeNode(S.userCoach, el.dataset.arch, el.dataset.key);
      await save(); render(); return;
    }

    if(act==="offer"){ offerRecruit(el.dataset.id); await save(); render(); return; }
    if(act==="sell"){
      const t = getUserTeam();
      const r = S.recruits.find(x=>x.id===el.dataset.id);
      if(!t || !r) return;
      applyRecruitAction(t, S.userCoach, r, el.dataset.kind);
      await save(); render(); return;
    }

    if(act==="visit_confirm"){
      const t = getUserTeam();
      const rid = el.dataset.rid;
      const r = S.recruits.find(x=>x.id===rid);
      if(!t || !r) return;

      const wk = parseInt(document.getElementById("visit_week_sel")?.value||"", 10);
      const cost = ACTIONS.visit.cost;

      const avail = t.recruiting.points - t.recruiting.spent;
      if(cost > avail) return toast("No Points", `Only ${avail} left.`, "bad");

      t.recruiting.spent += cost;
      r.visitScheduled[t.id] = wk;

      toast("Visit Scheduled", `${r.name} — ${weekName(wk)}`, "good");
      clearModal();
      await save(); render(); return;
    }

    if(act==="rf_apply"){
      S.ui.recruitFilters.pos = document.getElementById("rf_pos")?.value||"";
      S.ui.recruitFilters.state = document.getElementById("rf_state")?.value||"";
      S.ui.recruitFilters.stars = document.getElementById("rf_stars")?.value||"";
      S.ui.recruitFilters.sort = document.getElementById("rf_sort")?.value||"rank";
      await save(); render(); return;
    }
    if(act==="rf_clear"){
      S.ui.recruitFilters = {pos:"",state:"",stars:"",sort:"rank"};
      await save(); render(); return;
    }

    if(act==="rv_apply"){ S.ui.rosterPos = document.getElementById("rv_pos")?.value||""; await save(); render(); return; }
    if(act==="rv_clear"){ S.ui.rosterPos = ""; await save(); render(); return; }

    if(act==="save_settings"){
      S.settings.hideLockedRecruits = (document.getElementById("set_hide")?.value==="1");
      toast("Settings Saved","Applied.", "good");
      await save(); render(); return;
    }

    if(act==="reposition"){
      const team = getUserTeam();
      if(!team) return;
      if(!canRepositionNow()) return toast("Locked", "Offseason/Preseason only.", "bad");

      const pid = el.dataset.id;
      const p = team.roster.find(x=>x.id===pid);
      if(!p) return;

      if(p.pos !== "ATH") return toast("ATH Only", "Only ATH can be reassigned.", "bad");

      const sel = document.querySelector(`[data-possel="${pid}"]`);
      const newPos = sel ? sel.value : "ATH";
      if(!newPos || newPos==="ATH") return toast("Pick Position", "Choose a non-ATH position.", "warn");

      const pen = repositionPenalty(p.pos, newPos);
      p.pos = newPos;
      p.ovr = U.clamp(p.ovr - pen, 35, 99);

      computeNeeds(team);
      toast("Repositioned", `${p.name}: ATH → ${newPos} (OVR -${pen})`, "good");
      await save(); render(); return;
    }

  }catch(e){
    console.error(e);
    toast("Runtime Error", e?.message || "Unknown error", "bad");
  }
}

document.addEventListener("click", (e)=>{
  const bg = e.target?.id==="drawer" ? e.target : null;
  if(bg && bg.classList.contains("drawerOverlay") && bg.classList.contains("open")){
    if(e.target === bg) drawerClose();
    return;
  }
  const el = e.target.closest("[data-act]");
  if(!el) return;
  handle(el.dataset.act, el);
});

/* ---------- Boot ---------- */
(async function boot(){
  const loaded = await loadSave();
  if(loaded) S = loaded;
  render();
})();
</script>
