                  <div class="itemTitle"><span class="badge bAcc2">${p.pos}</span> <span class="badge bAcc">OVR ${p.ovr}</span> ${U.safe(p.name)}</div>
                  <div class="itemMeta">${p.year}</div>
                </div>
              </div>

              ${canRepositionNow() && p.pos==="ATH" ? `
                <div class="actionLine">
                  <select data-possel="${p.id}" style="flex:1; min-width:160px;">
                    ${GAME.POS.filter(pp=>pp!=="ATH").map(pp=>`<option value="${pp}">${pp}</option>`).join("")}
                  </select>
                  <button class="btnAccent" data-act="reposition" data-id="${p.id}">Reposition ATH</button>
                </div>
                <div class="hint">ATH-only. Offseason/Preseason only. Small OVR penalty.</div>
              ` : ``}
            </div>
          `;
        }).join("")}
      </div>
    </div>
  `;
}

function renderSchedule(){
  const t = getUserTeam();
  if(!t) return `<div class="card"><h2>Schedule</h2><div class="muted">Pick a team first.</div></div>`;
  const items=[];
  for(let w=1; w<=GAME.REG_WEEKS; w++){
    const sched = S.league.schedule[w-1];
    const g = (sched?.games||[]).find(x=>x.home===t.id || x.away===t.id);
    if(!g){ items.push({w, opp:"BYE", res:"—"}); continue; }
    const home=getTeam(g.home), away=getTeam(g.away);
    const opp = (g.home===t.id) ? `${away.name} (H)` : `${home.name} (A)`;
    const res = g.played ? ((g.home===t.id)? `${g.scoreH}-${g.scoreA}` : `${g.scoreA}-${g.scoreH}`) : "—";
    items.push({w, opp, res});
  }
  return `
    <div class="card">
      <h2>${U.safe(t.name)} Schedule</h2>
      <div class="sep"></div>
      <div class="list">
        ${items.map(x=>`
          <div class="itemCard">
            <div class="itemTop">
              <div class="itemTitle">Week ${x.w}</div>
              <span class="badge bAcc2">${U.safe(x.res)}</span>
            </div>
            <div class="itemMeta">${U.safe(x.opp)}</div>
          </div>
        `).join("")}
        <div class="itemCard">
          <div class="itemTitle">Postseason</div>
          <div class="itemMeta">Week 13: Conf Champs • Week 14: CFP R1 • Week 15: QF • Week 16: SF • Week 17: Title</div>
        </div>
      </div>
    </div>
  `;
}

function renderRecords(){
  const t=getUserTeam(), c=S.userCoach;
  if(!t||!c) return `<div class="card"><h2>Records</h2><div class="muted">Finish setup first.</div></div>`;

  rebuildLegacyLeaderboard();
  const legacy=S.records.legacy||[];
  const myRank=getUserLegacyRank();

  const top50=legacy.slice(0,50);
  let around=[];
  if(myRank){
    const start=Math.max(0,myRank-4);
    around=legacy.slice(start,start+7);
  }
  const hof=(S.records.hallOfFame||[]).slice().sort((a,b)=>(b.legacy-a.legacy)).slice(0,50);

  return `
    <div class="grid">
      <div class="card">
        <h2>Legacy Leaderboard (Top 50)</h2>
        <div class="sep"></div>
        <div class="list">
          ${top50.map((x,i)=>`
            <div class="itemCard">
              <div class="itemTop">
                <div>
                  <div class="itemTitle">#${i+1} ${U.safe(x.name)} ${x.user?'<span class="badge bGood">YOU</span>':''}</div>
                  <div class="itemMeta">${U.safe(x.school)} • ${U.safe(x.note||"")}</div>
                </div>
                <span class="badge ${x.user?"bGood":"bAcc"}">${U.fmt(x.legacy)}</span>
              </div>
            </div>
          `).join("")}
        </div>

        ${myRank ? `
          <div class="sep"></div>
          <h2>Around You (Rank #${myRank})</h2>
          <div class="sep"></div>
          <div class="list">
            ${around.map(x=>{
              const rnk=legacy.findIndex(z=>z.id===x.id)+1;
              return `
                <div class="itemCard" style="${x.user ? 'border-color: rgba(78,224,138,.55);' : ''}">
                  <div class="itemTop">
                    <div>
                      <div class="itemTitle">#${rnk} ${U.safe(x.name)} ${x.user?'<span class="badge bGood">YOU</span>':''}</div>
                      <div class="itemMeta">${U.safe(x.school)} • ${U.safe(x.note||"")}</div>
                    </div>
                    <span class="badge ${x.user?"bGood":"bAcc"}">${U.fmt(x.legacy)}</span>
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        `:""}
      </div>

      <div class="card">
        <h2>Hall of Fame</h2>
        <div class="muted mini">You retire at 35 seasons. AI coaches retire too. Hardline requirements only.</div>
        <div class="sep"></div>
        <div class="itemCard">
          <div class="itemTitle">HOF Requirements (ANY one qualifies)</div>
          <div class="itemMeta">${HOF_RULES.map(r=>`<span class="badge bAcc2">${U.safe(r.label)}</span>`).join(" ")}</div>
        </div>
        <div class="sep"></div>
        <div class="list">
          ${hof.length ? hof.map(x=>`
            <div class="itemCard">
              <div class="itemTop">
                <div>
                  <div class="itemTitle">${U.safe(x.name)} ${x.user?'<span class="badge bGood">YOU</span>':''} <span class="badge bGood">HOF</span></div>
                  <div class="itemMeta">${U.safe(x.lastSchool||x.school||"—")} • Legacy ${U.fmt(x.legacy)} • Retired ${x.retiredYear||"—"}</div>
                  <div class="itemMeta">W-L ${(x.career?.wins||0)}-${(x.career?.losses||0)} • Nattys ${(x.career?.natties||0)} • CFP Wins ${(x.career?.playoffWins||0)}</div>
                </div>
              </div>
            </div>
          `).join("") : `<div class="muted">No inductees yet.</div>`}
        </div>
      </div>
    </div>
  `;
}

function renderSettings(){
  const s = S.settings || {};
  return `
    <div class="card">
      <h2>Settings</h2>
      <div class="sep"></div>

      <label>XP Gain Speed</label>
      <select id="set_xp">
        ${[0.5,1,2,3,4].map(v=>`<option value="${v}" ${parseFloat(s.xpSpeed||1)==v?"selected":""}>${v}x</option>`).join("")}
      </select>

      <label>Skill Point Earn Rate</label>
      <select id="set_sp">
        ${[0.5,1,2,3,4].map(v=>`<option value="${v}" ${parseFloat(s.spRate||1)==v?"selected":""}>${v}x</option>`).join("")}
      </select>

      <label>Infinite Skill Points</label>
      <select id="set_inf">
        <option value="0" ${!s.infiniteSP?"selected":""}>Off</option>
        <option value="1" ${s.infiniteSP?"selected":""}>On</option>
      </select>

      <label>Hide Recruits Locked by Prestige Cap</label>
      <select id="set_hide">
        <option value="0" ${!s.hideLockedRecruits?"selected":""}>Off (Show locked)</option>
        <option value="1" ${s.hideLockedRecruits?"selected":""}>On (Hide locked)</option>
      </select>

      <label>Difficulty</label>
      <select id="set_diff">
        <option value="0.90" ${parseFloat(s.difficulty||1)==0.90?"selected":""}>Easier (0.90x)</option>
        <option value="1.00" ${parseFloat(s.difficulty||1)==1.00?"selected":""}>Normal (1.00x)</option>
        <option value="1.05" ${parseFloat(s.difficulty||1)==1.05?"selected":""}>Challenging (1.05x)</option>
        <option value="1.15" ${parseFloat(s.difficulty||1)==1.15?"selected":""}>Hard (1.15x)</option>
        <option value="1.25" ${parseFloat(s.difficulty||1)==1.25?"selected":""}>Brutal (1.25x)</option>
      </select>
      <div class="hint">Difficulty scales recruiting odds and randomness. CFP RNG stays tighter than regular season.</div>

      <div class="sep"></div>
      <button class="btnAccent" data-act="save_settings">Save Settings</button>

      <div class="sep"></div>
      <div class="muted mini">
        Prestige cap: <b>&lt;55 = 3★</b>, <b>55–69 = 4★</b>, <b>70+ = 5★</b>. “OPEN” bypasses.
      </div>
    </div>
  `;
}

/* ---------- Render ---------- */
function render(){
  updateSubline();
  renderDrawerNav();
  const app = document.getElementById("app");

  if(!S){
    app.innerHTML = `
      <div class="card">
        <h2>Welcome</h2>
        <div class="muted">No save found. Start a new dynasty.</div>
        <div class="sep"></div>
        <button class="btnAccent" data-act="new_game">New Game</button>
        <button data-act="load">Load Save</button>
      </div>
    `;
    renderOverlay();
    return;
  }

  const view = ({
    home: renderHome,
    rankings: renderRankings,
    coach: renderCoach,
    recruit: renderRecruiting,
    portal: renderPortal,
    jobs: renderJobs,
    schedule: renderSchedule,
    roster: renderRoster,
    records: renderRecords,
    settings: renderSettings,
  }[activeTab] || renderHome)();

  app.innerHTML = view;
  renderOverlay();
}

/* ---------- Actions ---------- */
async function handle(act, el){
  try{
    if(act==="drawer_open"){ drawerOpen(); return; }
    if(act==="drawer_close"){ drawerClose(); return; }

    if(act==="new_game"){ newGame(); await save(); toast("New Game","Dynasty created.","good"); render(); return; }
    if(act==="load"){
      const v=await loadSave();
      if(!v){toast("No Save","No save found.","bad");return;}
      S=v;

      // backfill
      S.flags ??= { startedCareer:false };
      S.settings ??= { hideLockedRecruits:false, xpSpeed:1, spRate:1, infiniteSP:false, difficulty:1.05 };
      S.records ??= buildInitialRecords();
      S.portal ??= { pool: [] };
      S.jobs ??= { offers: [] };
      S.polls ??= { apTop25:[], cfpTop25:[], lastWeek:0, lastReason:"" };
      S.ui ??= { modalQueue:[], rosterPos:"", recruitFilters:{pos:"",state:"",stars:"",sort:"rank",board:"all"}, portalFilters:{pos:"",sort:"interest"}, rankingView:"ap" };
      S.ui.rankingView ??= "ap";

      seedLegendCoaches();
      updatePolls("load");

      toast("Loaded","Save loaded.","good");
      render(); return;
    }

    if(act==="save"){ await save(); toast("Saved","Saved.","good"); render(); return; }
    if(act==="hard_reset"){ await hardReset(); toast("Reset","Save deleted.","warn"); render(); return; }

    if(act==="tab"){ activeTab = el.dataset.tab; drawerClose(); render(); return; }

    if(act==="rank_view"){
      S.ui.rankingView = el.dataset.view || "ap";
      await save(); render(); return;
    }

    if(act==="modal_ack"){ clearModal(); await save(); render(); return; }

    if(act==="retire_continue"){
      clearModal();
      S.userCoach=null;
      S.userTeamId=null;
      S.phase="setup";
      S.weekIndex=0;
      toast("New Career","Create a new coach to continue this world.","good");
      await save(); render(); return;
    }

    // ✅ Coach creation -> auto open team picker
    if(act==="create_coach"){
      const name = (document.getElementById("coach_name")?.value||"").trim() || ("Coach " + U.pick(NAME.coachLast));
      S.userCoach = makeCoach({name});
      toast("Coach Created", `${S.userCoach.name} (HC)`, "good");
      await save();
      openTeamPicker();
      return;
    }

    if(act==="team_picker"){
      if(!S.userCoach) return toast("Coach Required","Create coach first.","bad");
      openTeamPicker();
      return;
    }
    if(act==="close_picker"){ render(); return; }

    if(act==="select_team"){
      if(!S.userCoach) return toast("Coach Required","Create coach first.","bad");
      const team = getTeam(el.dataset.team);

      const startOnly = !(S.flags && S.flags.startedCareer);
      if(startOnly){
        const bottom25 = S.league.teams.slice().sort((a,b)=>a.prestige-b.prestige).slice(0,25);
        const ok = bottom25.some(x=>x.id===team.id);
        if(!ok) return toast("Bottom 25 Rule","You must start with a Bottom 25 prestige team.","bad");
      }

      S.userTeamId = team.id;
      placeUserCoachOnTeam(team, S.userCoach);

      // Make sure user's coach is on the team and keeps record updates consistently
      team.staff.HC = S.userCoach;

      S.phase = "season";
      S.weekIndex = 0;
      S.flags.startedCareer = true;

      resetForNewSeason();
      updatePolls("team_selected");
      toast("Team Selected", `${team.name} • HC`, "good");
      await save(); render(); return;
    }

    if(act==="advance" || act==="sim"){ advance(); await save(); render(); return; }

    if(act==="perk"){
      upgradeNode(S.userCoach, el.dataset.arch, el.dataset.key);
      await save(); render(); return;
    }

    if(act==="offer"){ offerRecruit(el.dataset.id); await save(); render(); return; }
    if(act==="sell"){
      const t = getUserTeam();
      const r = S.recruits.find(x=>x.id===el.dataset.id);
      if(!t || !r) return;
      applyRecruitAction(t, S.userCoach, r, el.dataset.kind);
      await save(); render(); return;
    }

    if(act==="visit_confirm"){
      const t = getUserTeam();
      const rid = el.dataset.rid;
      const r = S.recruits.find(x=>x.id===rid);
      if(!t || !r) return;

      const wk = parseInt(document.getElementById("visit_week_sel")?.value||"", 10);
      const cost = ACTIONS.visit.cost;

      const avail = t.recruiting.points - t.recruiting.spent;
      if(cost > avail) return toast("No Points", `Only ${avail} left.`, "bad");

      t.recruiting.spent += cost;
      r.visitScheduled[t.id] = wk;

      toast("Visit Scheduled", `${r.name} — ${weekName(wk)}`, "good");
      clearModal();
      await save(); render(); return;
    }

    if(act==="rf_apply"){
      S.ui.recruitFilters.pos = document.getElementById("rf_pos")?.value||"";
      S.ui.recruitFilters.state = document.getElementById("rf_state")?.value||"";
      S.ui.recruitFilters.stars = document.getElementById("rf_stars")?.value||"";
      S.ui.recruitFilters.sort = document.getElementById("rf_sort")?.value||"rank";
      S.ui.recruitFilters.board = document.getElementById("rf_board")?.value || "all";
      await save(); render(); return;
    }
    if(act==="rf_clear"){
      S.ui.recruitFilters = {pos:"",state:"",stars:"",sort:"rank",board:"all"};
      await save(); render(); return;
    }

    if(act==="pf_apply"){
      S.ui.portalFilters.pos = document.getElementById("pf_pos")?.value||"";
      S.ui.portalFilters.sort = document.getElementById("pf_sort")?.value||"interest";
      await save(); render(); return;
    }
    if(act==="pf_clear"){
      S.ui.portalFilters = {pos:"",sort:"interest"};
      await save(); render(); return;
    }

    if(act==="portal_push"){
      portalPush(el.dataset.id, parseInt(el.dataset.pts,10));
      await save(); render(); return;
    }

    if(act==="accept_job"){
      acceptJob(el.dataset.id);
      await save(); render(); return;
    }

    if(act==="rv_apply"){ S.ui.rosterPos = document.getElementById("rv_pos")?.value||""; await save(); render(); return; }
    if(act==="rv_clear"){ S.ui.rosterPos = ""; await save(); render(); return; }

    if(act==="reposition"){
      const team = getUserTeam();
      if(!team) return;
      if(!canRepositionNow()) return toast("Locked", "Offseason/Preseason only.", "bad");

      const pid = el.dataset.id;
      const p = team.roster.find(x=>x.id===pid);
      if(!p) return;

      if(p.pos !== "ATH") return toast("ATH Only", "Only ATH can be reassigned.", "bad");

      const sel = document.querySelector(`[data-possel="${pid}"]`);
      const newPos = sel ? sel.value : "ATH";
      if(!newPos || newPos==="ATH") return toast("Pick Position", "Choose a non-ATH position.", "warn");

      const pen = repositionPenalty(p.pos, newPos);
      p.pos = newPos;
      p.ovr = U.clamp(p.ovr - pen, 35, 99);

      computeNeeds(team);
      toast("Repositioned", `${p.name}: ATH → ${newPos} (OVR -${pen})`, "good");
      await save(); render(); return;
    }

    if(act==="save_settings"){
      S.settings.xpSpeed = parseFloat(document.getElementById("set_xp")?.value||"1");
      S.settings.spRate = parseFloat(document.getElementById("set_sp")?.value||"1");
      S.settings.infiniteSP = (document.getElementById("set_inf")?.value==="1");
      S.settings.hideLockedRecruits = (document.getElementById("set_hide")?.value==="1");
      S.settings.difficulty = parseFloat(document.getElementById("set_diff")?.value||"1.05");
      toast("Settings Saved","Applied.", "good");
      await save(); render(); return;
    }

  }catch(e){
    console.error(e);
    toast("Runtime Error", e?.message || "Unknown error", "bad");
  }
}

/* ---------- Click routing ---------- */
document.addEventListener("click", (e)=>{
  const bg = e.target?.id==="drawer" ? e.target : null;
  if(bg && bg.classList.contains("drawerOverlay") && bg.classList.contains("open")){
    if(e.target === bg) drawerClose();
    return;
  }
  const el = e.target.closest("[data-act]");
  if(!el) return;
  handle(el.dataset.act, el);
});

/* ---------- Boot ---------- */
(async function boot(){
  const loaded = await loadSave();
  if(loaded) S = loaded;

  if(S){
    S.flags ??= { startedCareer:false };
    S.settings ??= { hideLockedRecruits:false, xpSpeed:1, spRate:1, infiniteSP:false, difficulty:1.05 };
    S.records ??= buildInitialRecords();
    S.portal ??= {pool:[]};
    S.jobs ??= {offers:[]};
    S.polls ??= { apTop25:[], cfpTop25:[], lastWeek:0, lastReason:"" };
    S.ui ??= { modalQueue:[], rosterPos:"", recruitFilters:{pos:"",state:"",stars:"",sort:"rank",board:"all"}, portalFilters:{pos:"",sort:"interest"}, rankingView:"ap" };
    S.ui.rankingView ??= "ap";

    seedLegendCoaches();
    updatePolls("boot");
  }

  render();
})();
</script>
